<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roadmap Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#EFF3F8;
      --bg-2:#E4EAF2;
      --paper:#FFFFFF;
      --paper-soft:#F4F7FB;
      --paper-deep:#EAF0F7;
      --ink:#12253A;
      --text:#2E4459;
      --muted:#6B84A0;
      --soft:#9DB4CC;
      --line:rgba(18,37,58,.10);
      --line-soft:rgba(18,37,58,.06);
      --deep:#1565C0;
      --deep-2:#1976D2;
      --deep-soft:#DDEEFF;
      --bronze:#0097A7;
      --bronze-soft:#E0F7FA;
      --sage:#00897B;
      --sage-soft:#E0F2F1;
      --red:#E53935;
      --red-soft:#FFEBEE;
      --accent:#29B6F6;
      --accent-soft:#E1F5FE;
      --shadow:0 1px 4px rgba(18,37,58,.08),0 8px 24px rgba(18,37,58,.10);
      --shadow-soft:0 1px 2px rgba(18,37,58,.05),0 4px 12px rgba(18,37,58,.07);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
      --radius-sm:12px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;height:100%}
    body{
      font-family:'Manrope',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(900px 500px at -100px 0px,rgba(41,182,246,.08),transparent 60%),
        radial-gradient(600px 400px at 110% 100%,rgba(21,101,192,.07),transparent 60%),
        linear-gradient(160deg,#E8F0FA 0%,#EFF4FB 60%,#F4F8FC 100%);
      color:var(--text);
      font-size:14px;
      line-height:1.5;
      overflow:hidden;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}

    .app{height:100vh;display:grid;grid-template-rows:auto minmax(0,1fr);overflow:hidden}

    .top-shell{
      padding:10px 28px 0;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(18px);
      position:relative;
      z-index:10;
    }

    .top-row{display:flex;align-items:center;justify-content:space-between;gap:22px;position:relative;z-index:2}
    .brand-title{font-family:'Forum',Georgia,serif;font-size:22px;line-height:1;background:linear-gradient(135deg,#1565C0,#0288D1 50%,#0097A7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:400;letter-spacing:-.025em}
    .brand-sub{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.03em}
    .top-actions{display:flex;align-items:center;gap:8px;justify-content:flex-end;flex-wrap:nowrap}
    .save-note{font-size:11px;color:var(--sage);font-weight:700;margin-right:3px}

    .main-menu{display:flex;align-items:center;gap:4px;margin-top:8px;position:relative;z-index:2}
    .menu-tab{
      height:34px;border:1px solid transparent;background:transparent;color:var(--muted);
      border-radius:10px 10px 0 0;padding:0 12px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:7px;
      transition:.16s ease;border-bottom:none;
    }
    .menu-tab:hover{background:rgba(21,101,192,.06);color:var(--ink)}
    .menu-tab.active{background:var(--paper);border-color:var(--line);border-bottom-color:transparent;color:var(--ink);margin-bottom:-1px;padding-bottom:1px}
    .menu-ico{display:flex;align-items:center;line-height:1;color:inherit;opacity:.8}

    .btn{
      height:34px;border:1px solid var(--line);border-radius:12px;background:var(--paper);color:var(--ink);
      padding:0 12px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:7px;
      transition:.16s ease;box-shadow:var(--shadow-soft);
    }
    .btn:hover{background:var(--paper-soft);border-color:rgba(21,101,192,.22);transform:translateY(-1px);box-shadow:var(--shadow)}
    .btn.primary{background:linear-gradient(135deg,#1565C0,#1976D2);border-color:transparent;color:#fff;box-shadow:0 3px 12px rgba(21,101,192,.28)}
    .btn.primary:hover{background:linear-gradient(135deg,#1976D2,#1E88E5);box-shadow:0 6px 18px rgba(21,101,192,.36)}
    .btn.small{height:28px;border-radius:10px;padding:0 9px;font-size:12px}
    .btn.ghost{background:transparent;border-color:transparent;color:var(--muted);box-shadow:none}
    .btn.ghost:hover{background:var(--paper-soft);border-color:var(--line-soft)}
    .btn.danger{background:var(--red-soft);color:var(--red);border-color:rgba(229,57,53,.15)}

    .page{min-height:0;overflow:hidden;padding:16px 28px 16px;display:flex;flex-direction:column}
    .page-inner{width:100%;flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
    .cards-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding-bottom:16px}

    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}
    .search{height:46px;width:min(520px,100%);background:var(--paper);border:1px solid var(--line);border-radius:16px;display:flex;align-items:center;gap:10px;padding:0 14px;box-shadow:var(--shadow-soft)}
    .search span{color:var(--soft);font-size:20px}.search input{border:0;outline:0;background:transparent;width:100%;color:var(--ink)}.search input::placeholder{color:var(--soft)}
    .filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .filter-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);font-weight:800;margin-right:3px}
    .pill{height:31px;border:1px solid var(--line);background:var(--paper);border-radius:999px;color:var(--muted);padding:0 12px;font-weight:700;font-size:12px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;box-shadow:var(--shadow-soft)}
    .pill.active{background:linear-gradient(135deg,#1565C0,#1976D2);border-color:transparent;color:#fff}.pill.info{background:var(--deep-soft);color:var(--deep);border-color:rgba(21,101,192,.16)}.pill.warn{background:var(--bronze-soft);color:var(--bronze);border-color:rgba(0,151,167,.18)}.pill.risk{background:var(--red-soft);color:var(--red);border-color:rgba(229,57,53,.16)}.pill.done{background:var(--sage-soft);color:var(--sage);border-color:rgba(0,137,123,.16)}

    .stats{display:grid;grid-template-columns:repeat(5,minmax(100px,1fr));gap:10px;margin-bottom:18px}
    .stat{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:12px 14px;box-shadow:var(--shadow-soft);display:flex;align-items:end;justify-content:space-between;gap:10px;position:relative;overflow:hidden}.stat::before{content:"";position:absolute;right:-18px;top:-18px;width:64px;height:64px;border-radius:50%;background:radial-gradient(circle,rgba(21,101,192,.08),transparent 70%)}
    .stat-v{font-family:'Forum',Georgia,serif;font-size:28px;line-height:.9;color:var(--ink)}
    .stat-l{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap}

    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
    .project-card{min-height:248px;background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:20px 20px 16px;box-shadow:var(--shadow);cursor:pointer;position:relative;overflow:hidden;transition:.18s ease}
    .project-card::after{content:"";position:absolute;right:-58px;top:-40px;width:170px;height:102px;border-radius:58% 42% 65% 35%;background:rgba(21,101,192,.05)}
    .project-card::before{content:"";position:absolute;left:0;top:0;width:100%;height:3px;background:linear-gradient(90deg,#1565C0,#29B6F6,#0097A7);border-radius:24px 24px 0 0}
    .project-card:hover{transform:translateY(-3px);border-color:rgba(21,101,192,.24);box-shadow:0 12px 36px rgba(18,37,58,.14)}
    .card-kicker{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;position:relative;z-index:2}
    .eyebrow{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);font-weight:800}
    .project-title{font-family:'Forum',Georgia,serif;font-size:29px;line-height:1.03;color:var(--ink);font-weight:400;letter-spacing:-.03em;position:relative;z-index:2;margin-bottom:12px}
    .project-desc{color:var(--muted);font-size:13px;line-height:1.55;position:relative;z-index:2;min-height:42px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:18px;position:relative;z-index:2}
    .card-foot{position:relative;z-index:2;margin-top:18px;display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:11px;font-weight:700}.progress{height:4px;background:rgba(21,101,192,.10);border-radius:999px;overflow:hidden;margin-top:8px}.progress span{display:block;height:100%;background:linear-gradient(90deg,#1565C0,#29B6F6);border-radius:999px}
    .card-kicker{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;position:relative;z-index:2}
    .eyebrow{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);font-weight:800}
    .project-title{font-family:'Forum',Georgia,serif;font-size:29px;line-height:1.03;color:var(--ink);font-weight:400;letter-spacing:-.03em;position:relative;z-index:2;margin-bottom:12px}
    .project-desc{color:var(--muted);font-size:13px;line-height:1.55;position:relative;z-index:2;min-height:42px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:18px;position:relative;z-index:2}
    .card-foot{position:relative;z-index:2;margin-top:18px;display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:11px;font-weight:700}.progress{height:4px;background:rgba(124,92,252,.15);border-radius:999px;overflow:hidden;margin-top:8px}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--deep),var(--deep-2));border-radius:999px;box-shadow:0 0 8px rgba(124,92,252,.6)}

    .detail-shell{flex:1;min-height:0;display:grid;grid-template-rows:auto 46px minmax(0,1fr);background:var(--paper);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);overflow:hidden}
    .detail-head{padding:12px 20px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:18px;background:linear-gradient(135deg,#fff,#F4F8FC)}
    .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:11px;font-weight:800;cursor:pointer;margin-right:14px;flex-shrink:0}.back:hover{color:var(--deep)}
    .detail-head-left{display:flex;align-items:baseline;gap:0;min-width:0;flex-direction:column}
    .detail-title{font-family:'Forum',Georgia,serif;font-size:24px;line-height:1.1;color:var(--ink);font-weight:400;letter-spacing:-.025em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:700px}.detail-desc{color:var(--muted);margin-top:2px;max-width:700px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.detail-actions{display:flex;gap:7px;flex-wrap:nowrap;justify-content:flex-end;flex-shrink:0}
    .view-tabs{height:46px;border-bottom:1px solid var(--line);background:var(--paper-soft);display:flex;align-items:center;justify-content:space-between;padding:0 12px;gap:10px}
    .view-tab-list{display:flex;gap:2px;overflow-x:auto}.view-tab{height:30px;border:0;background:transparent;color:var(--muted);border-radius:10px;padding:0 10px;font-weight:800;font-size:13px}.view-tab:hover{background:rgba(21,101,192,.08);color:var(--ink)}.view-tab.active{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff}.task-search{width:200px;height:30px;border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:0 10px;outline:0;color:var(--ink);font-size:13px}

    .detail-content{min-height:0;height:100%}.content-grid{height:100%;display:grid;grid-template-columns:minmax(0,1fr) minmax(500px,40%);min-height:0}.left-pane{min-width:0;min-height:0;border-right:1px solid var(--line);overflow:hidden;display:flex;flex-direction:column;background:#FAFCFF}.right-pane{min-height:0;overflow-y:auto;overflow-x:hidden;background:var(--paper-soft)}
    .planner{flex:1;min-height:0;display:grid;grid-template-columns:225px minmax(0,1fr)}.phase-rail{min-height:0;overflow-y:auto;overflow-x:hidden;border-right:1px solid var(--line);background:var(--paper-deep);padding:14px}.phase-rail-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);font-weight:800;margin-bottom:10px}.phase-view-toggle{display:grid;grid-template-columns:1fr 1fr;background:rgba(21,101,192,.07);border:1px solid var(--line-soft);border-radius:15px;padding:4px;gap:4px;margin-bottom:11px}.phase-view-toggle button{height:29px;border:0;border-radius:11px;background:transparent;color:var(--muted);font-size:12px;font-weight:800}.phase-view-toggle button.active{background:var(--paper);color:var(--deep);box-shadow:var(--shadow-soft)}
    .phase-card,.phase-all-card{width:100%;text-align:left;border:1px solid var(--line);background:var(--paper);border-radius:17px;padding:12px;margin-bottom:9px;transition:.16s ease;box-shadow:var(--shadow-soft)}.phase-card:hover,.phase-all-card:hover{border-color:rgba(21,101,192,.22);box-shadow:var(--shadow)}.phase-card.active,.phase-all-card.active{background:#EEF4FF;border-color:rgba(21,101,192,.32);box-shadow:inset 3px 0 0 var(--deep),var(--shadow-soft)}.phase-name{font-size:12px;font-weight:800;color:var(--ink);line-height:1.3}.phase-meta{font-size:11px;color:var(--muted);font-weight:700;margin-top:6px}
    .task-area{min-width:0;min-height:0;overflow-y:auto;overflow-x:hidden;background:#FAFCFF}.table-head,.task-row{display:grid;grid-template-columns:minmax(240px,1.35fr) minmax(180px,1fr) 98px 104px 92px;gap:10px;align-items:center}.table-head{height:42px;position:sticky;top:0;z-index:5;background:rgba(255,255,255,.97);border-bottom:1px solid var(--line);padding:0 14px;font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--soft);font-weight:800}.phase-strip{height:38px;position:sticky;top:42px;z-index:4;display:flex;align-items:center;gap:8px;padding:0 14px;background:linear-gradient(90deg,#DDEEFF,rgba(255,255,255,.96));border-bottom:1px solid var(--line);font-size:12px;color:var(--ink);font-weight:800}.phase-strip span:last-child{margin-left:auto;font-size:11px;color:var(--muted)}.task-row{min-height:60px;padding:10px 14px;border-bottom:1px solid var(--line-soft);cursor:pointer;transition:.14s ease}.task-row:hover{background:#F0F6FF}.task-row.active{background:#EEF4FF;box-shadow:inset 3px 0 0 var(--deep)}.task-main{display:grid;grid-template-columns:10px minmax(0,1fr);gap:9px;min-width:0}.dot{width:8px;height:8px;border-radius:999px;margin-top:5px;background:var(--deep)}.dot.milestone{background:var(--bronze)}.dot.risk{background:var(--red)}.dot.done{background:var(--sage)}.task-title{font-size:13px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.task-sub{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.task-result{font-size:12px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.task-date{font-size:11px;color:var(--text);font-weight:700;line-height:1.35}.people{display:flex;align-items:center;gap:0;overflow:hidden}.avatar{width:23px;height:23px;min-width:23px;border-radius:999px;background:linear-gradient(135deg,#1565C0,#29B6F6);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;border:2px solid var(--paper)}.avatar+.avatar{margin-left:-7px}.more-people{font-size:11px;color:var(--muted);font-weight:800;margin-left:4px}

    .badge{height:24px;border-radius:999px;padding:0 9px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:1px solid transparent;white-space:nowrap}.badge.new{color:#1565C0;background:#DDEEFF;border-color:rgba(21,101,192,.18)}.badge.progress{color:#00695C;background:#E0F2F1;border-color:rgba(0,105,92,.16)}.badge.done{color:var(--sage);background:var(--sage-soft);border-color:rgba(0,137,123,.16)}.badge.risk{color:var(--red);background:var(--red-soft);border-color:rgba(229,57,53,.16)}.badge.approval{color:#00838F;background:#E0F7FA;border-color:rgba(0,131,143,.16)}

    .editor{padding:14px;display:grid;gap:12px;align-content:start}.editor-hero{background:linear-gradient(135deg,#fff,#EEF4FF);border:1px solid var(--line);border-left:3px solid var(--deep);border-radius:22px;padding:16px;position:relative;overflow:hidden;box-shadow:var(--shadow-soft)}.editor-hero::after{content:"";position:absolute;right:-38px;top:-28px;width:142px;height:78px;border-radius:58% 42% 64% 36%;background:rgba(21,101,192,.06)}.editor-kicker{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}.editor-title{font-family:'Forum',Georgia,serif;font-size:27px;line-height:1.03;color:var(--ink);font-weight:400;letter-spacing:-.025em}.editor-desc{font-size:13px;color:var(--muted);margin-top:8px}.section{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:var(--shadow-soft)}.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}.section-title{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--soft);font-weight:900}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:flex;flex-direction:column;gap:5px;min-width:0}.field.full{grid-column:1/-1}.label{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--soft);font-weight:800}.input,.select,.textarea{width:100%;border:1px solid var(--line);background:var(--paper-soft);border-radius:14px;padding:8px 10px;outline:0;color:var(--ink)}.textarea{min-height:62px;resize:vertical;line-height:1.45}.input:focus,.select:focus,.textarea:focus{border-color:rgba(21,101,192,.40);box-shadow:0 0 0 4px rgba(21,101,192,.08);background:#fff}
    .subtask{display:grid;grid-template-columns:22px minmax(0,1fr) 118px 28px;gap:8px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:7px;margin-bottom:7px;background:var(--paper-soft)}.check{width:17px;height:17px;accent-color:var(--deep)}.mini-input{border:0;outline:0;min-width:0;background:transparent;color:var(--ink)}.mini-date{height:28px;border:1px solid var(--line);border-radius:11px;background:var(--paper);padding:0 7px;font-size:11px;color:var(--muted)}.mini-del{width:28px;height:28px;border:0;background:transparent;color:var(--soft);border-radius:10px;font-weight:900}.mini-del:hover{background:var(--red-soft);color:var(--red)}.add-row{display:grid;grid-template-columns:minmax(0,1fr) 118px 76px;gap:8px;margin-top:8px}
    .smart{display:grid;gap:8px}.smart-note{font-size:12px;color:var(--muted);background:var(--paper-soft);border:1px solid var(--line);border-radius:14px;padding:9px 10px;margin-bottom:8px}.smart-row{display:grid;grid-template-columns:34px minmax(0,1fr);gap:9px;align-items:start}.smart-letter{width:30px;height:30px;border-radius:12px;background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900}.smart-meta{font-size:11px;color:var(--muted);font-weight:800;margin-bottom:5px}.comment{border:1px solid var(--line);background:var(--paper-soft);border-radius:14px;padding:9px 10px;margin-bottom:7px}.comment strong{font-size:12px}.comment p{font-size:13px;color:var(--muted);margin-top:3px}.comment small{font-size:11px;color:var(--soft)}

    .gantt-wrap{height:100%;display:grid;grid-template-columns:220px 1fr;overflow:hidden;background:#FAFCFF}
    .gantt-left{display:flex;flex-direction:column;border-right:2px solid var(--line);background:#FAFCFF;z-index:4;overflow:hidden}
    .gantt-left-head{height:52px;flex-shrink:0;display:flex;align-items:center;padding:0 14px;font-size:10px;text-transform:uppercase;letter-spacing:.11em;font-weight:900;color:var(--soft);border-bottom:2px solid var(--line)}
    .gantt-left-body{overflow-y:auto;overflow-x:hidden;flex:1;scrollbar-width:none}
    .gantt-left-body::-webkit-scrollbar{display:none}
    .gantt-label-phase{height:34px;padding:0 12px;display:flex;align-items:center;background:rgba(21,101,192,.06);border-bottom:1px solid var(--line);font-size:11px;font-weight:900;color:#1565C0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .gantt-label-row{height:36px;padding:0 12px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--line-soft);cursor:pointer}
    .gantt-label-row:hover{background:#EEF4FF}
    .gantt-name{font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .gantt-right{overflow:auto;display:flex;flex-direction:column}
    .gantt-right-head{flex-shrink:0;position:sticky;top:0;z-index:3;background:rgba(250,252,255,.98);border-bottom:2px solid var(--line)}

function progress(mapId){const arr=mapItems(mapId);return arr.length?Math.round(arr.filter(i=>i.status==='done').length/arr.length*100):0}
function counts(mapId=state.activeMap){const arr=mapItems(mapId);return{phases:state.phases.filter(p=>p.map===mapId).length,items:arr.length,done:arr.filter(i=>i.status==='done').length,risks:arr.filter(i=>i.status==='risk'||i.type==='risk').length,progress:progress(mapId)}}
function people(i){const ids=[i.owner,...(i.people||[])].filter(Boolean);const unique=[...new Set(ids)],visible=unique.slice(0,3);return`<div class="people">${visible.map(id=>`<span class="avatar" title="${esc(U(id).name)}">${esc(U(id).avatar)}</span>`).join('')}${unique.length>3?`<span class="more-people">+${unique.length-3}</span>`:''}</div>`}
function taskColorClass(i){if(i.status==='done')return'done';if(i.status==='risk'||i.type==='risk')return'risk';if(i.type==='milestone')return'milestone';return''}
function durationText(i){return`${i.duration||'—'} дн.<br><span style="color:var(--muted)">${fmt(i.start)} → ${fmt(i.due)}</span>`}

function setSection(section){state.section=section;render()}
function openMap(id){state.activeMap=id;state.section='detail';state.selected=mapItems(id)[0]?.id;state.taskSearch='';state.activePhase=phases()[0]?.id;render()}
function backToCards(){state.section='cards';render()}
function setTab(t){
  state.activeTab=t;
  // обновляем только классы кнопок табов
  document.querySelectorAll('.view-tab').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.tab===t);
  });
  renderDetailMain();
  save();
}
function selectItem(id){state.selected=id;const item=state.items.find(i=>i.id===id);if(item)state.activePhase=item.phase;renderDetailMain();save()}

function render(){if(!state.section)state.section='cards';if(!state.activeMap)state.activeMap=state.maps[0]?.id;if(!state.selected)state.selected=items()[0]?.id;if(!state.activePhase)state.activePhase=phases()[0]?.id;if(!state.phaseView)state.phaseView='selected';renderNav();if(state.section==='cards')renderCards();if(state.section==='detail')renderDetail();if(state.section==='people')renderPeople();if(state.section==='directory')renderDirectory();if(state.section==='globalkanban')renderGlobalKanban();save()}
function renderNav(){['cards','globalkanban','people','directory'].forEach(k=>{const el=document.getElementById('nav-'+k);if(el)el.classList.toggle('active',state.section===k||(k==='cards'&&state.section==='detail'))})}

function renderGlobalKanban(){
  const sts=[['new','Не начато'],['progress','В работе'],['approval','Согласование'],['risk','Риски'],['done','Готово']];
  const allItems=state.items;
  const totalItems=allItems.length;
  const doneItems=allItems.filter(i=>i.status==='done').length;
  const totalPct=totalItems?Math.round(doneItems/totalItems*100):0;
  // phase lookup
  const phaseById=Object.fromEntries(state.phases.map(p=>[p.id,p.title]));
  // map lookup
  const mapById=Object.fromEntries(state.maps.map(m=>[m.id,m]));

  const colsHtml=sts.map(([s,l])=>{
    const colItems=allItems.filter(i=>i.status===s);
    // group by map
    const byMap={};
    colItems.forEach(i=>{
      if(!byMap[i.map])byMap[i.map]=[];
      byMap[i.map].push(i);
    });
    const projectsHtml=state.maps.map(m=>{
      const mItems=byMap[m.id]||[];
      if(!mItems.length)return'';
      return`<div class="gk-project">
        <div class="gk-project-name">
          <span title="${esc(m.title)}">${esc(m.title)}</span>
          <span class="gk-project-prog">${mItems.length}</span>
        </div>
        ${mItems.map(i=>`<div class="gk-card" onclick="openMap('${m.id}');state.selected='${i.id}';state.activeTab='table';setTimeout(renderDetail,0)">
          <div class="gk-card-title">${esc(i.title)}</div>
          <div class="gk-card-meta">
            ${phaseById[i.phase]?`<span class="gk-phase-tag">${esc(phaseById[i.phase])}</span>`:''}
            ${i.due?`<span>${fmt(i.due)}</span>`:''}
          </div>
        </div>`).join('')}
      </div>`;
    }).join('');
    return`<div class="gk-col">
      <div class="gk-col-head">
        <span class="gk-col-label">${l}</span>
        <span class="gk-col-count">${colItems.length}</span>
      </div>
      ${projectsHtml||`<div class="gk-empty">Нет задач</div>`}
    </div>`;
  }).join('');

  document.getElementById('root').innerHTML=`<div class="global-kanban">
    <div class="gk-toolbar">
      <span class="gk-title">Общий прогресс</span>
      <span class="gk-sub">${state.maps.length} проекта · ${totalItems} задач · выполнено ${totalPct}%</span>
    </div>
    <div class="gk-grid">${colsHtml}</div>
  </div>`;
}
function filteredMaps(){const q=(state.mapSearch||'').toLowerCase().trim();return state.maps.filter(m=>(state.mapFilter==='all'||m.status===state.mapFilter)&&(!q||[m.title,m.desc,U(m.owner).name].join(' ').toLowerCase().includes(q)))}
function renderStats(maps){const all=state.items;return`<div class="stats"><div class="stat"><div class="stat-l">карт</div><div class="stat-v">${state.maps.length}</div></div><div class="stat"><div class="stat-l">объектов</div><div class="stat-v">${all.length}</div></div><div class="stat"><div class="stat-l">готово</div><div class="stat-v">${all.filter(i=>i.status==='done').length}</div></div><div class="stat"><div class="stat-l">рисков</div><div class="stat-v">${all.filter(i=>i.status==='risk'||i.type==='risk').length}</div></div><div class="stat"><div class="stat-l">показано</div><div class="stat-v">${maps.length}</div></div></div>`}
function renderCards(){const maps=filteredMaps();document.getElementById('root').innerHTML=`<div class="toolbar"><label class="search"><span>⌕</span><input placeholder="Поиск по картам, владельцам, описанию..." value="${esc(state.mapSearch||'')}" oninput="state.mapSearch=this.value;renderCards();save()"></label><div class="filters"><span class="filter-label">Статус</span>${[['all','Все'],['progress','В работе'],['new','Не начато'],['done','Готово']].map(([v,l])=>`<button class="pill ${state.mapFilter===v?'active':''}" onclick="state.mapFilter='${v}';renderCards();save()">${l}</button>`).join('')}</div></div>${renderStats(maps)}<div class="cards-scroll"><div class="cards-grid">${maps.map(m=>{const c=counts(m.id);return`<article class="project-card" onclick="openMap('${m.id}')"><div class="card-kicker"><span class="eyebrow">Проектная карта</span>${badge(m.status)}</div><h2 class="project-title">${esc(m.title)}</h2><p class="project-desc">${esc(m.desc)}</p><div class="card-tags"><span class="pill info">${esc(m.horizon||'период')}</span><span class="pill">${esc(U(m.owner).name)}</span><span class="pill ${c.risks?'risk':'info'}">${c.risks} рисков</span></div><div class="card-foot"><span>${c.phases} фаз · ${c.items} объектов</span><span>${c.progress}%</span></div><div class="progress"><span style="width:${c.progress}%"></span></div></article>`}).join('')}</div></div>`}

function renderPeople(){document.getElementById('root').innerHTML=`<div class="panel-placeholder"><h2>Люди</h2><p>Здесь можно хранить участников, роли и зоны ответственности. Сейчас список берётся из демо-данных проекта.</p></div><div class="cards-grid" style="margin-top:16px">${state.users.map(u=>`<div class="project-card" style="min-height:150px"><div class="card-kicker"><span class="eyebrow">Участник</span><span class="avatar">${esc(u.avatar)}</span></div><h2 class="project-title" style="font-size:25px">${esc(u.name)}</h2><p class="project-desc">${esc(u.role)}</p></div>`).join('')}</div>`}
function renderDirectory(){document.getElementById('root').innerHTML=`<div class="panel-placeholder"><h2>Справочники</h2><p>Раздел для статусов, типов задач, шаблонов SMART и типовых этапов. Пока это лёгкая заготовка, чтобы структура продукта была цельной.</p></div>`}

function renderDetail(){const m=currentMap();const c=counts();document.getElementById('root').innerHTML=`<div class="detail-shell"><div class="detail-head"><div style="display:flex;align-items:center;min-width:0;flex:1"><div class="back" onclick="backToCards()">← Назад</div><div class="detail-head-left"><h1 class="detail-title">${esc(m.title)}</h1><p class="detail-desc">${esc(m.desc)}</p></div></div><div class="detail-actions"><button class="btn small" onclick="openMapModal('${m.id}')">Редактировать</button><button class="btn small" onclick="openPhaseModal()">+ Фаза</button><button class="btn small primary" onclick="openItemModal('task')">+ Задача</button><button class="btn small" onclick="openItemModal('milestone')">+ Веха</button></div></div><div class="view-tabs"><div class="view-tab-list">${[['table','Таблица'],['gantt','Гант'],['roadmap','Roadmap'],['kanban','Канбан'],['calendar','Календарь'],['analytics','Аналитика']].map(([id,l])=>`<button class="view-tab ${state.activeTab===id?'active':''}" data-tab="${id}" onclick="setTab('${id}')">${l}</button>`).join('')}</div><input class="task-search" placeholder="Поиск задачи" value="${esc(state.taskSearch||'')}" oninput="state.taskSearch=this.value;renderDetailMain();save()"></div><div class="detail-content" id="detailContent"></div></div>`;renderDetailMain()}
function renderDetailMain(){const v=state.activeTab;if(v==='table')return renderTable();if(v==='gantt')return renderGantt();if(v==='roadmap')return renderRoadmap();if(v==='kanban')return renderKanban();if(v==='calendar')return renderCalendar();if(v==='analytics')return renderAnalytics()}

function renderTable(){const phs=phases();if(!state.activePhase||!phs.find(p=>p.id===state.activePhase))state.activePhase=phs[0]?.id;if(!state.phaseView)state.phaseView='selected';let rail=`<div class="phase-rail-title">Фазы проекта</div><div class="phase-view-toggle"><button class="${state.phaseView==='selected'?'active':''}" onclick="state.phaseView='selected';renderDetailMain();save()">Одна</button><button class="${state.phaseView==='all'?'active':''}" onclick="state.phaseView='all';renderDetailMain();save()">Все</button></div><button class="phase-all-card ${state.phaseView==='all'?'active':''}" onclick="state.phaseView='all';renderDetailMain();save()"><div class="phase-name">Все фазы вместе</div><div class="phase-meta">${items().length} объектов</div></button>${phs.map(p=>{const arr=items().filter(i=>i.phase===p.id);return`<button class="phase-card ${state.phaseView==='selected'&&state.activePhase===p.id?'active':''}" onclick="state.phaseView='selected';state.activePhase='${p.id}';renderDetailMain();save()"><div class="phase-name">${esc(p.title)}</div><div class="phase-meta">${arr.length} объектов</div></button>`}).join('')}<button class="btn small" style="width:100%;margin-top:5px" onclick="openPhaseModal()">+ Фаза</button>`;
let rows=`<div class="table-head"><div>Ключевые задачи и вехи</div><div>Результат</div><div>Длительность</div><div>Участники</div><div>Статус</div></div>`;
if(state.phaseView==='all'){
  phs.forEach(p=>{const arr=items().filter(i=>i.phase===p.id);rows+=`<div class="phase-strip"><span>${esc(p.title)}</span><button class="btn small" onclick="openItemModal('task','${p.id}')">+ задача</button><button class="btn small" onclick="openItemModal('milestone','${p.id}')">+ веха</button><span>${arr.length} объектов</span></div>`;rows+=arr.map(taskRow).join('')||'<div class="empty">В этой фазе пока нет задач.</div>'})
}else{
  const p=phs.find(x=>x.id===state.activePhase)||phs[0];const arr=items().filter(i=>!p||i.phase===p.id);rows+=`<div class="phase-strip"><span>${esc(p?.title||'Фаза')}</span><button class="btn small" onclick="openItemModal('task','${p?.id||''}')">+ задача</button><button class="btn small" onclick="openItemModal('milestone','${p?.id||''}')">+ веха</button><span>${arr.length} объектов</span></div>`;rows+=arr.map(taskRow).join('')||'<div class="empty">В этой фазе пока нет задач.</div>'
}
document.getElementById('detailContent').innerHTML=`<div class="content-grid"><div class="left-pane"><div class="planner"><div class="phase-rail">${rail}</div><div class="task-area">${rows}</div></div></div><div class="right-pane">${renderEditor()}</div></div>`}
function taskRow(i){return`<div class="task-row ${state.selected===i.id?'active':''}" onclick="selectItem('${i.id}')"><div class="task-main"><span class="dot ${taskColorClass(i)}"></span><div><div class="task-title">${esc(i.title)}</div><div class="task-sub">${typeLabel(i.type)} · ответственный: ${esc(U(i.owner).name)}</div></div></div><div class="task-result">${esc(i.result)}</div><div class="task-date">${durationText(i)}</div>${people(i)}${badge(i.status)}</div>`}

function renderEditor(){const i=selected();if(!i)return'<div class="empty">Выбери задачу</div>';const smartInfo=[['S','Specific','что именно нужно сделать'],['M','Measurable','как понять, что результат достигнут'],['A','Achievable','реально ли выполнить с текущими ресурсами'],['R','Relevant','зачем это нужно проекту/бизнесу'],['T','Time-bound','к какому сроку должно быть готово']];return`<div class="editor"><div class="editor-hero"><div class="editor-kicker">${badge(i.status)}<span class="badge ${i.type==='risk'?'risk':i.type==='milestone'?'approval':'new'}">${typeLabel(i.type)}</span><span class="badge progress">${esc(U(i.owner).name)}</span></div><div class="editor-title">${esc(i.title)}</div><div class="editor-desc">${esc(i.desc||'')}</div></div><div class="section"><div class="section-head"><div class="section-title">Основное</div></div><div class="form-grid"><div class="field"><label class="label">Тип</label><select class="select" onchange="updateItem('type',this.value)">${['task','milestone','risk','decision'].map(v=>`<option value="${v}" ${i.type===v?'selected':''}>${typeLabel(v)}</option>`).join('')}</select></div><div class="field"><label class="label">Статус</label><select class="select" onchange="updateItem('status',this.value)">${['new','progress','approval','risk','done'].map(v=>`<option value="${v}" ${i.status===v?'selected':''}>${statusLabel(v)}</option>`).join('')}</select></div><div class="field full"><label class="label">Название</label><input class="input" value="${esc(i.title)}" onchange="updateItem('title',this.value)"></div><div class="field full"><label class="label">Результат / Deliverable</label><textarea class="textarea" onchange="updateItem('result',this.value)">${esc(i.result||'')}</textarea></div><div class="field full"><label class="label">Описание</label><textarea class="textarea" onchange="updateItem('desc',this.value)">${esc(i.desc||'')}</textarea></div></div></div><div class="section"><div class="section-head"><div class="section-title">Сроки и ответственность</div></div><div class="form-grid"><div class="field"><label class="label">Начало</label><input type="date" class="input" value="${i.start||''}" onchange="updateItem('start',this.value)"></div><div class="field"><label class="label">Срок</label><input type="date" class="input" value="${i.due||''}" onchange="updateItem('due',this.value)"></div><div class="field"><label class="label">Длительность</label><input class="input" type="number" value="${i.duration||''}" onchange="updateItem('duration',Number(this.value)||0)"></div><div class="field"><label class="label">Ответственный</label><select class="select" onchange="updateItem('owner',this.value)">${state.users.map(u=>`<option value="${u.id}" ${i.owner===u.id?'selected':''}>${esc(u.name)}</option>`).join('')}</select></div></div></div><div class="section"><div class="section-head"><div class="section-title">Подзадачи</div></div>${renderSubtasks(i)}</div><div class="section"><div class="section-head"><div class="section-title">SMART</div></div><div class="smart-note">SMART нужен, чтобы задача была не “сделать красиво”, а проверяемым результатом с понятным сроком.</div><div class="smart">${smartInfo.map(([l,name,hint],idx)=>`<div class="smart-row"><div class="smart-letter">${l}</div><div><div class="smart-meta">${name} — ${hint}</div><input class="input" value="${esc((i.smart||[])[idx]||'')}" onchange="updateSmart(${idx},this.value)"></div></div>`).join('')}</div></div><div class="section"><div class="section-head"><div class="section-title">Комментарии</div><button class="btn small" onclick="openCommentModal()">+ Комментарий</button></div>${(i.comments||[]).map(c=>`<div class="comment"><strong>${esc(U(c.user).name)}</strong><p>${esc(c.text)}</p><small>${fmt(c.date)}</small></div>`).join('')||'<div class="comment"><p>Комментариев пока нет.</p></div>'}</div></div>`}
function renderSubtasks(i){const arr=i.subtasks||[];return`${arr.map((s,idx)=>`<div class="subtask"><input class="check" type="checkbox" ${s.done?'checked':''} onchange="updateSubtask(${idx},'done',this.checked)"><input class="mini-input" value="${esc(s.title)}" onchange="updateSubtask(${idx},'title',this.value)"><input class="mini-date" type="date" value="${s.due||''}" onchange="updateSubtask(${idx},'due',this.value)"><button class="mini-del" onclick="deleteSubtask(${idx})">×</button></div>`).join('')||'<div style="color:var(--muted);font-weight:700;font-size:12px">Подзадач пока нет.</div>'}<div class="add-row"><input id="newSubtaskTitle" class="input" placeholder="Новая подзадача"><input id="newSubtaskDue" class="input" type="date"><button class="btn primary" onclick="addSubtask()">Добавить</button></div>`}
function updateItem(k,v){const i=selected();if(!i)return;i[k]=v;save();renderDetail()}
function updateSmart(idx,v){const i=selected();i.smart=i.smart||['','','','',''];i.smart[idx]=v;save();renderDetailMain()}
function addSubtask(){const i=selected();const title=document.getElementById('newSubtaskTitle')?.value.trim();if(!title){toast('Нужно название подзадачи');return}i.subtasks=i.subtasks||[];i.subtasks.push({id:uid(),title,due:document.getElementById('newSubtaskDue')?.value||'',done:false});save();renderDetailMain();toast('Подзадача добавлена')}
function updateSubtask(idx,k,v){const i=selected();if(!i?.subtasks?.[idx])return;i.subtasks[idx][k]=v;save();renderDetailMain()}
function deleteSubtask(idx){const i=selected();if(!i?.subtasks)return;i.subtasks.splice(idx,1);save();renderDetailMain();toast('Подзадача удалена')}

function renderGantt(){
  const arr=items().slice().sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  if(!arr.length){document.getElementById('detailContent').innerHTML='<div class="empty">Нет задач для Ганта</div>';return}
  const allDates=arr.flatMap(i=>[i.start,i.due]).filter(Boolean).sort();
  const rangeStart=new Date(allDates[0]+'T00:00:00');
  const rangeEnd=new Date(allDates[allDates.length-1]+'T00:00:00');
  rangeStart.setDate(rangeStart.getDate()-2);
  rangeEnd.setDate(rangeEnd.getDate()+4);
  const days=[];
  for(let d=new Date(rangeStart);d<=rangeEnd;d.setDate(d.getDate()+1))days.push(new Date(d));
  const DAY_W=32;
  const todayStr=today();
  const dIdx=dateStr=>dateStr?Math.round((new Date(dateStr+'T00:00:00')-rangeStart)/86400000):-1;
  const ds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const dcls=d=>{const dow=d.getDay();const s=ds(d);return(dow===0||dow===6)?'weekend':s===todayStr?'today-day':''};

  // month header
  let monthsHtml='';let curM=-1;
  days.forEach((d,i)=>{
    if(d.getMonth()!==curM){
      curM=d.getMonth();
      let cnt=0;for(let j=i;j<days.length&&days[j].getMonth()===curM;j++)cnt++;
      monthsHtml+=`<div class="gantt-month" style="width:${cnt*DAY_W}px">${d.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}</div>`;
    }
  });
  const daysHtml=days.map(d=>`<div class="gantt-day ${dcls(d)}">${d.getDate()}</div>`).join('');
  const totalW=days.length*DAY_W;
  const cellsHtml=days.map(d=>`<div class="gantt-grid-cell ${dcls(d)}"></div>`).join('');

  let leftHtml='';let rightHtml='';
  phases().forEach(p=>{
    const phaseItems=arr.filter(i=>i.phase===p.id);
    if(!phaseItems.length)return;
    leftHtml+=`<div class="gantt-label-phase">${esc(p.title)}</div>`;
    rightHtml+=`<div class="gantt-grid-phase">${cellsHtml}</div>`;
    phaseItems.forEach(i=>{
      const cls=i.status==='done'?'done':i.type==='milestone'?'milestone':i.status==='risk'||i.type==='risk'?'risk':i.status==='approval'?'approval':'task';
      const left=Math.max(0,dIdx(i.start||allDates[0]));
      const right=dIdx(i.due||i.start||allDates[0]);
      const span=Math.max(1,right-left+1);
      leftHtml+=`<div class="gantt-label-row" onclick="selectItem('${i.id}');setTab('table')"><div class="dot ${cls}" style="flex-shrink:0;margin-top:0"></div><div class="gantt-name">${esc(i.title)}</div></div>`;
      rightHtml+=`<div class="gantt-grid-row" onclick="selectItem('${i.id}');setTab('table')">${cellsHtml}<div class="gantt-bar-wrap ${cls}" style="left:${left*DAY_W+2}px;width:${span*DAY_W-4}px"></div></div>`;
    });
  });
  const todayIdx=dIdx(todayStr);
  const todayLine=todayIdx>=0&&todayIdx<days.length?`<div class="gantt-today-line" style="left:${todayIdx*DAY_W+DAY_W/2}px"></div>`:'';

  document.getElementById('detailContent').innerHTML=`
  <div class="gantt-wrap">
    <div class="gantt-left">
      <div class="gantt-left-head">Задачи</div>
      <div class="gantt-left-body" id="gLeftBody">${leftHtml}</div>
    </div>
    <div class="gantt-right" id="gRight">
      <div class="gantt-right-head">
        <div class="gantt-months" style="width:${totalW}px">${monthsHtml}</div>
        <div class="gantt-days" style="width:${totalW}px">${daysHtml}</div>
      </div>
      <div class="gantt-right-body" style="width:${totalW}px;position:relative">${todayLine}${rightHtml}</div>
    </div>
  </div>`;
  // sync vertical scroll between left body and right
  const lb=document.getElementById('gLeftBody');
  const gr=document.getElementById('gRight');
  gr.addEventListener('scroll',()=>{lb.scrollTop=gr.scrollTop});
}
function renderRoadmap(){document.getElementById('detailContent').innerHTML=`<div class="roadmap">${phases().map(p=>{const arr=items().filter(i=>i.phase===p.id);return`<div class="roadmap-col"><div class="roadmap-head"><span>${esc(p.title)}</span><span>${arr.length}</span></div>${arr.map(i=>`<div class="roadmap-item" onclick="selectItem('${i.id}');state.activeTab='table';renderDetail()"><div class="roadmap-item-title">${esc(i.title)}</div><div class="roadmap-item-result">${esc(i.result)}</div>${badge(i.status)}</div>`).join('')}</div>`}).join('')}</div>`}
function renderKanban(){
  const sts=[['new','Не начато'],['progress','В работе'],['approval','Согласование'],['risk','Риски'],['done','Готово']];
  const phaseMap=Object.fromEntries(phases().map(p=>[p.id,p.title]));
  document.getElementById('detailContent').innerHTML=`<div class="kanban">${sts.map(([s,l])=>{
    const arr=items().filter(i=>i.status===s);
    return`<div class="kanban-col" ondragover="dragOver(event)" ondragleave="this.classList.remove('over')" ondrop="dropItem(event,'${s}')">
      <div class="kanban-head"><span>${l}</span><span class="gk-col-count">${arr.length}</span></div>
      ${arr.map(i=>{
        const phaseName=phaseMap[i.phase]||'';
        return`<div class="kanban-card" draggable="true" ondragstart="dragStart(event,'${i.id}')" onclick="selectItem('${i.id}');setTab('table')">
          <div class="kanban-title">${esc(i.title)}</div>
          <div class="kanban-meta">
            ${phaseName?`<span class="kanban-phase-tag">${esc(phaseName)}</span>`:''}
            <span>${esc(U(i.owner).name)}</span>
            ${i.due?`<span>· ${fmt(i.due)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('')}</div>`;
}
function dragStart(e,id){e.dataTransfer.setData('text/plain',id)}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('over')}
function dropItem(e,status){e.preventDefault();e.currentTarget.classList.remove('over');const id=e.dataTransfer.getData('text/plain'),i=state.items.find(x=>x.id===id);if(i){i.status=status;state.selected=id;save();renderKanban();toast('Статус обновлён')}}
function renderCalendar(){const now=new Date(),y=now.getFullYear(),m=now.getMonth();let first=new Date(y,m,1).getDay()-1;if(first<0)first=6;const daysInMonth=new Date(y,m+1,0).getDate();let html=`<div class="calendar"><div class="calendar-title">Календарь сроков · ${now.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}</div><div class="cal-grid">${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div class="cal-head">${d}</div>`).join('')}`;for(let i=0;i<first;i++)html+='<div class="cal-cell"></div>';for(let day=1;day<=daysInMonth;day++){const date=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const arr=items().filter(i=>i.start===date||i.due===date);html+=`<div class="cal-cell"><div class="cal-num">${day}</div>${arr.map(i=>`<div class="cal-item" onclick="selectItem('${i.id}');state.activeTab='table';renderDetail()">${esc(i.title)}</div>`).join('')}</div>`}html+='</div></div>';document.getElementById('detailContent').innerHTML=html}
function renderAnalytics(){const arr=items(),total=arr.length||1,statusRows=['new','progress','approval','risk','done'].map(s=>[statusLabel(s),arr.filter(i=>i.status===s).length,s]),quality=[['С результатом',arr.filter(i=>i.result).length],['Со SMART',arr.filter(i=>i.smart&&i.smart.filter(Boolean).length>=5).length],['С ответственным',arr.filter(i=>i.owner).length],['С подзадачами',arr.filter(i=>(i.subtasks||[]).length).length]];document.getElementById('detailContent').innerHTML=`<div class="analytics"><div class="chart-card"><div class="chart-title">Статусы</div>${statusRows.map(([l,n,s])=>`<div class="bar-row"><div class="bar-label"><span>${l}</span><span>${n}</span></div><div class="bar"><span style="width:${n/total*100}%;background:${s==='done'?'var(--sage)':s==='risk'?'var(--red)':s==='approval'?'var(--bronze)':'var(--deep)'}"></span></div></div>`).join('')}</div><div class="chart-card"><div class="chart-title">Качество управления</div>${quality.map(([l,n])=>`<div class="bar-row"><div class="bar-label"><span>${l}</span><span>${n}</span></div><div class="bar"><span style="width:${n/total*100}%"></span></div></div>`).join('')}</div></div>`}

function openMapModal(id){const m=id?state.maps.find(x=>x.id===id):null;document.getElementById('modal').innerHTML=`<h2>${m?'Редактировать карту':'Новая карта'}</h2><div class="form-grid"><div class="field full"><label class="label">Название</label><input id="mapTitle" class="input" value="${esc(m?.title||'')}"></div><div class="field full"><label class="label">Описание</label><textarea id="mapDesc" class="textarea">${esc(m?.desc||'')}</textarea></div><div class="field"><label class="label">Начало</label><input id="mapStart" type="date" class="input" value="${m?.start||today()}"></div><div class="field"><label class="label">Срок</label><input id="mapDue" type="date" class="input" value="${m?.due||today()}"></div></div><div class="modal-foot"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveMap('${id||''}')">Сохранить</button></div>`;openModal()}
function saveMap(id){const title=document.getElementById('mapTitle').value.trim();if(!title){toast('Нужно название карты');return}if(id){const m=state.maps.find(x=>x.id===id);Object.assign(m,{title,desc:document.getElementById('mapDesc').value,start:document.getElementById('mapStart').value,due:document.getElementById('mapDue').value})}else{const newId=uid();state.maps.push({id:newId,title,desc:document.getElementById('mapDesc').value,owner:'u1',status:'new',horizon:'новый проект',start:document.getElementById('mapStart').value,due:document.getElementById('mapDue').value});state.phases.push({id:uid(),map:newId,title:'Фаза 1 · Новый этап',sort:1});state.activeMap=newId;state.selected=null}closeModal();render();toast('Карта сохранена')}
function openPhaseModal(){document.getElementById('modal').innerHTML=`<h2>Новая фаза</h2><div class="field"><label class="label">Название фазы</label><input id="phaseTitle" class="input" placeholder="Фаза 1 · Анализ"></div><div class="modal-foot"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="savePhase()">Добавить</button></div>`;openModal()}
function savePhase(){const title=document.getElementById('phaseTitle').value.trim();if(!title){toast('Нужно название фазы');return}state.phases.push({id:uid(),map:state.activeMap,title,sort:phases().length+1});state.activePhase=state.phases[state.phases.length-1].id;closeModal();render();toast('Фаза добавлена')}
function openItemModal(type='task',phaseId=''){const p=phaseId||state.activePhase||phases()[0]?.id;document.getElementById('modal').innerHTML=`<h2>${type==='milestone'?'Новая веха':'Новая задача'}</h2><div class="form-grid"><div class="field full"><label class="label">Название</label><input id="itemTitle" class="input" placeholder="Что нужно сделать"></div><div class="field full"><label class="label">Результат</label><textarea id="itemResult" class="textarea" placeholder="Что должно быть на выходе"></textarea></div><div class="field"><label class="label">Фаза</label><select id="itemPhase" class="select">${phases().map(x=>`<option value="${x.id}" ${x.id===p?'selected':''}>${esc(x.title)}</option>`).join('')}</select></div><div class="field"><label class="label">Ответственный</label><select id="itemOwner" class="select">${state.users.map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('')}</select></div><div class="field"><label class="label">Начало</label><input id="itemStart" type="date" class="input" value="${today()}"></div><div class="field"><label class="label">Срок</label><input id="itemDue" type="date" class="input" value="${today()}"></div></div><div class="modal-foot"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveItem('${type}')">Создать</button></div>`;openModal()}
function saveItem(type){const title=document.getElementById('itemTitle').value.trim();if(!title){toast('Нужно название');return}const id=uid(),phase=document.getElementById('itemPhase').value;state.items.push({id,map:state.activeMap,phase,type,title,result:document.getElementById('itemResult').value,desc:'',status:'new',priority:'medium',owner:document.getElementById('itemOwner').value,people:[],start:document.getElementById('itemStart').value,due:document.getElementById('itemDue').value,duration:1,smart:['','','','',''],subtasks:[],comments:[]});state.selected=id;state.activePhase=phase;state.section='detail';closeModal();render();toast('Объект создан')}
function openCommentModal(){document.getElementById('modal').innerHTML=`<h2>Комментарий</h2><div class="field"><label class="label">Текст</label><textarea id="commentText" class="textarea" placeholder="Комментарий"></textarea></div><div class="modal-foot"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveComment()">Добавить</button></div>`;openModal()}
function saveComment(){const i=selected(),text=document.getElementById('commentText').value.trim();if(!text){toast('Нужен текст комментария');return}i.comments=i.comments||[];i.comments.push({user:'u1',text,date:today()});closeModal();save();renderDetailMain();toast('Комментарий добавлен')}
function openModal(){document.getElementById('modalBackdrop').classList.add('open')}
function closeModal(){document.getElementById('modalBackdrop').classList.remove('open')}
function exportJson(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='roadmap-studio-data.json';a.click();URL.revokeObjectURL(url);toast('Экспорт готов')}
function importJson(e){const file=e.target.files?.[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();render();toast('Импорт выполнен')}catch{toast('Не удалось прочитать JSON')}};r.readAsText(file);e.target.value=''}
render();
</script>
</body>
</html>
