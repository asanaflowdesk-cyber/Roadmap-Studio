      <div class="field"><span class="lbl">Роль платформы</span><select id="uPlatformRole" class="sel"><option value="user">Пользователь</option><option value="admin">Администратор</option></select></div>
      <div class="field"><span class="lbl">Добавить в команду</span><select id="uTeam" class="sel"><option value="">— не добавлять —</option>${teams.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select></div>
      <div class="field"><span class="lbl">Роль в команде</span><select id="uTeamRole" class="sel"><option value="member">Участник</option><option value="lead">Руководитель</option></select></div>
      <div class="field"><span class="lbl">Добавить в проект</span><select id="uProject" class="sel"><option value="">— не добавлять —</option>${projects.map(p=>`<option value="${p.id}">${esc(p.title)}</option>`).join('')}</select></div>
      <div class="field"><span class="lbl">Доступ к проекту</span><select id="uAccess" class="sel"><option value="read">👁 Чтение</option><option value="full">✏️ Полный</option></select></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn primary" onclick="createUserFull()">Создать</button>
    </div>`;
  openModal();
}

function createUserFull(){
  const name=$('uName').value.trim();if(!name){toast('Нужно имя');return}
  const colors=['linear-gradient(135deg,#1565C0,#42A5F5)','linear-gradient(135deg,#00897B,#26A69A)','linear-gradient(135deg,#7B1FA2,#AB47BC)','linear-gradient(135deg,#E65100,#FF8A65)','linear-gradient(135deg,#AD1457,#F06292)'];
  const newId=uid();
  const u={id:newId,name,initials:name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),color:colors[DB.users.length%colors.length],platformRole:$('uPlatformRole').value,email:$('uEmail').value.trim(),login:$('uLogin').value.trim()||name.toLowerCase().replace(/\s+/,'.'),$password:$('uPass').value};
  DB.users.push(u);
  // add to team
  const teamId=$('uTeam').value;
  if(teamId){const t=DB.teams.find(x=>x.id===teamId);if(t)t.members.push({userId:newId,role:$('uTeamRole').value})}
  // add to project
  const projId=$('uProject').value;
  if(projId){const p=DB.projects.find(x=>x.id===projId);if(p){p.access=p.access||[];if(!p.access.find(a=>a.userId===newId))p.access.push({userId:newId,level:$('uAccess').value})}}
  saveDB();closeModal();renderSettings($('mainContent'));toast(`Пользователь ${name} создан ✓`);
}

function openEditUserModal(userId){
  const u=DB.users.find(x=>x.id===userId);if(!u)return;
  const allTeams=DB.teams;
  const allProjects=DB.projects;

  // current memberships
  const userTeamMemberships=allTeams.map(t=>{
    const m=t.members.find(x=>x.userId===userId);
    return{team:t,role:m?.role||null,isMember:!!m};
  });
  const userProjectAccess=allProjects.map(p=>{
    const a=p.access?.find(x=>x.userId===userId);
    const t=allTeams.find(x=>x.id===p.teamId);
    return{project:p,team:t,level:a?.level||'none'};
  });

  $('modalBox').innerHTML=`<h2 style="font-size:20px">${esc(u.name)}</h2>
    <div style="overflow-y:auto;max-height:70vh">

      <!-- Основное -->
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:900;color:var(--soft);margin:0 0 8px">Данные</div>
      <div class="form-2" style="margin-bottom:16px">
        <div class="field"><span class="lbl">Фамилия Имя</span><input id="euName" class="inp" value="${esc(u.name)}"></div>
        <div class="field"><span class="lbl">Email</span><input id="euEmail" class="inp" value="${esc(u.email||'')}" placeholder="email@company.kz"></div>
        <div class="field"><span class="lbl">Логин</span><input id="euLogin" class="inp" value="${esc(u.login||'')}"></div>
        <div class="field"><span class="lbl">Новый пароль</span>
          <div style="display:flex;gap:5px">
            <input id="euPass" class="inp" placeholder="Оставьте пустым" style="flex:1">
            <button class="btn sm" onclick="$('euPass').value=genPassword()" type="button">↺</button>
          </div>
        </div>
        <div class="field"><span class="lbl">Роль платформы</span>
          <select id="euPlatformRole" class="sel" ${u.id===CU.id?'disabled':''}>
            <option value="user" ${u.platformRole==='user'?'selected':''}>Пользователь</option>
            <option value="admin" ${u.platformRole==='admin'?'selected':''}>Администратор</option>
            <option value="superadmin" ${u.platformRole==='superadmin'?'selected':''}>Суперадмин</option>
          </select>
        </div>
      </div>

      <!-- Команды -->
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:900;color:var(--soft);margin:0 0 8px">Участие в командах</div>
      <div style="border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px">
        ${userTeamMemberships.map(({team:t,role,isMember})=>`
          <div style="display:grid;grid-template-columns:1fr 140px 80px;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line-soft);align-items:center">
            <div style="display:flex;align-items:center;gap:8px">
              <div style="width:8px;height:8px;border-radius:3px;background:${t.color.includes('1565')?'#1565C0':t.color.includes('7B1F')?'#7B1FA2':'#00897B'};flex-shrink:0"></div>
              <span style="font-size:12px;font-weight:700;color:var(--ink)">${esc(t.name)}</span>
            </div>
            <select class="access-sel" id="tm-${t.id}" onchange="updateUserTeamRole('${userId}','${t.id}',this.value)">
              <option value="none" ${!isMember?'selected':''}>— не участник —</option>
              <option value="member" ${isMember&&role==='member'?'selected':''}>Участник</option>
              <option value="lead" ${isMember&&role==='lead'?'selected':''}>Руководитель</option>
            </select>
            <span style="font-size:10px;color:${isMember?'var(--green)':'var(--soft)'};font-weight:800">${isMember?'✓ в команде':'—'}</span>
          </div>`).join('')}
      </div>

      <!-- Проекты -->
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:900;color:var(--soft);margin:0 0 8px">Доступ к проектам</div>
      <div style="border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px">
        ${userProjectAccess.map(({project:p,team:t,level})=>`
          <div style="display:grid;grid-template-columns:1fr 90px 190px;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line-soft);align-items:center">
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--ink)">${esc(p.title)}</div>
              <div style="font-size:10px;color:var(--muted)">${esc(t?.name||'')}</div>
            </div>
            <span class="badge ${p.status}" style="justify-self:start">${{new:'Не начато',progress:'В работе',done:'Готово',risk:'Риски'}[p.status]||p.status}</span>
            <select class="access-sel ${level}" id="pa-${p.id}" onchange="this.className='access-sel '+this.value;updateUserProjectAccess('${userId}','${p.id}',this.value)">
              <option value="none" ${level==='none'?'selected':''}>🚫 Нет доступа</option>
              <option value="read" ${level==='read'?'selected':''}>👁 Чтение</option>
              <option value="full" ${level==='full'?'selected':''}>✏️ Полный</option>
            </select>
          </div>`).join('')}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn primary" onclick="saveEditUser('${userId}')">Сохранить</button>
    </div>`;
  openModal();
}

function updateUserTeamRole(userId,teamId,role){
  const t=DB.teams.find(x=>x.id===teamId);if(!t)return;
  if(role==='none'){
    t.members=t.members.filter(m=>m.userId!==userId);
  } else {
    const m=t.members.find(x=>x.userId===userId);
    if(m)m.role=role;else t.members.push({userId,role});
  }
}

function updateUserProjectAccess(userId,projectId,level){
  const p=DB.projects.find(x=>x.id===projectId);if(!p)return;
  p.access=p.access||[];
  const a=p.access.find(x=>x.userId===userId);
  if(a)a.level=level;else p.access.push({userId,level});
}

function saveEditUser(userId){
  const u=DB.users.find(x=>x.id===userId);if(!u)return;
  const name=$('euName')?.value.trim();if(!name){toast('Нужно имя');return}
  u.name=name;u.initials=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  u.email=$('euEmail')?.value.trim()||u.email;
  u.login=$('euLogin')?.value.trim()||u.login;
  const newPass=$('euPass')?.value;if(newPass)u.$password=newPass;
  if(u.id!==CU.id)u.platformRole=$('euPlatformRole')?.value||u.platformRole;
  if(u.id===CU.id){CU=u;$('topName').textContent=CU.name;$('topAv').textContent=CU.initials;}
  saveDB();closeModal();renderSettings($('mainContent'));toast('Сохранено ✓');
}

function saveUser(){
  const name=$('uName').value.trim();if(!name){toast('Нужно имя');return}
  const colors=['linear-gradient(135deg,#1565C0,#42A5F5)','linear-gradient(135deg,#00897B,#26A69A)','linear-gradient(135deg,#7B1FA2,#AB47BC)','linear-gradient(135deg,#E65100,#FF8A65)'];
  DB.users.push({id:uid(),name,initials:name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),color:colors[DB.users.length%colors.length],platformRole:'user'});
  saveDB();closeModal();renderSettings($('mainContent'));toast('Пользователь создан ✓');
}
function deleteUser(id){const u=DB.users.find(x=>x.id===id);if(!hasPermission('platform.users.delete',{user:u,userId:id}))return deny('Нет права удалить пользователя');if(!confirm('Удалить пользователя?'))return;DB.users=DB.users.filter(u=>u.id!==id);DB.teams.forEach(t=>t.members=t.members.filter(m=>m.userId!==id));DB.projects.forEach(p=>p.access=p.access?.filter(a=>a.userId!==id)||[]);saveDB();renderSettings($('mainContent'));toast('Удалён')}

function changePlatformRole(uid2,role){const u=DB.users.find(x=>x.id===uid2);if(!u)return;if(!hasPermission('platform.roles.assign',{user:u,userId:uid2}))return deny('Нет права менять роль платформы');if(role==='superadmin'&&!isSuperAdmin(CU))return deny('Суперадмина может назначить только суперадмин');u.platformRole=role;saveDB();renderSettings($('mainContent'));toast('Роль обновлена ✓')}


function openAddMemberModal(teamId){
  const t=DB.teams.find(x=>x.id===teamId);
  const available=DB.users.filter(u=>!t?.members.some(m=>m.userId===u.id));
  $('modalBox').innerHTML=`<h2>Добавить участника</h2>
    ${available.length?`<div class="field"><span class="lbl">Пользователь</span><select id="newMember" class="sel">${available.map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('')}</select></div>
    <div class="field"><span class="lbl">Роль</span><select id="newMemberRole" class="sel"><option value="member">Участник</option><option value="lead">Руководитель</option></select></div>`
    :`<div class="small muted" style="margin-bottom:12px">Все пользователи уже в команде. Создайте нового в разделе «Пользователи».</div>`}
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Отмена</button>
      ${available.length?`<button class="btn primary" onclick="addMember('${teamId}')">Добавить</button>`:''}
    </div>`;
  openModal();
}
function addMember(teamId){const t=DB.teams.find(x=>x.id===teamId);const uid2=$('newMember')?.value;const role=$('newMemberRole')?.value||'member';if(t&&uid2){t.members.push({userId:uid2,role});saveDB();closeModal();renderAdmin($('mainContent'));toast('Участник добавлен ✓')}}
function removeMember(teamId,userId){const t=DB.teams.find(x=>x.id===teamId);if(t){t.members=t.members.filter(m=>m.userId!==userId);saveDB();renderAdmin($('mainContent'));toast('Участник удалён')}}
function changeTeamRole(teamId,userId,role){const t=DB.teams.find(x=>x.id===teamId);const m=t?.members.find(x=>x.userId===userId);if(m)m.role=role}

function openProjectModal(teamId){
  const tid=teamId||VS.teamId;
  $('modalBox').innerHTML=`<h2>Новый проект</h2>
    <div class="field"><span class="lbl">Название</span><input id="pjTitle" class="inp"></div>
    <div class="field"><span class="lbl">Описание</span><textarea id="pjDesc" class="sel txsm" style="resize:vertical"></textarea></div>
    <div class="form-2">
      <div class="field"><span class="lbl">Горизонт</span><input id="pjHorizon" class="inp" placeholder="Q2 2026"></div>
      <div class="field"><span class="lbl">Срок</span><input id="pjDue" type="date" class="inp" value="${today()}"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn primary" onclick="saveProject('${tid}')">Создать</button>
    </div>`;
  openModal();
}
function saveProject(teamId){
  const title=$('pjTitle').value.trim();if(!title){toast('Нужно название');return}
  const newId=uid();
  const team=DB.teams.find(t=>t.id===teamId);
  const access=team?team.members.map(m=>({userId:m.userId,level:m.role==='lead'?'full':'read'})):[];
  if(!access.find(a=>a.userId===CU.id))access.push({userId:CU.id,level:'full'});
  DB.projects.push({id:newId,teamId,title,desc:$('pjDesc').value,status:'new',horizon:$('pjHorizon').value||'новый',start:today(),due:$('pjDue').value,ownerId:CU.id,access});
  DB.phases.push({id:uid(),projectId:newId,title:'Фаза 1 · Старт',sort:1});
  saveDB();closeModal();openProject(newId);toast('Проект создан ✓');
}
function openProjectAccessModal(projectId){
  if(!canManageProjectAccess(projectId))return deny('Нет права управлять доступами проекта');
  const p=DB.projects.find(x=>x.id===projectId);const t=DB.teams.find(x=>x.id===p?.teamId);if(!p||!t)return;
  const users=[...new Set([...t.members.map(m=>m.userId),...DB.users.map(u=>u.id)])].map(id=>U(id));
  $('modalBox').innerHTML=`<h2>Доступы · ${esc(p.title)}</h2><div class="matrix-wrap"><table class="matrix"><thead><tr><th>Пользователь</th><th>Команда</th><th>Роль в проекте</th></tr></thead><tbody>${users.map(u=>{const a=p.access?.find(x=>x.userId===u.id);const role=a?.role||levelToProjectRole(a?.level)||'none';const tr=t.members.find(m=>m.userId===u.id)?.role||'—';return`<tr><td><div class="matrix-user"><div class="dt-av" style="background:${u.color};width:24px;height:24px;font-size:8px">${esc(u.initials)}</div>${esc(u.name)}</div></td><td>${tr==='lead'?'Руководитель':tr==='member'?'Участник':'—'}</td><td><select class="access-sel ${projectRoleToLevel(role)}" id="pa-${u.id}" onchange="this.className='access-sel '+projectRoleToLevel(this.value)"><option value="projectManager" ${role==='projectManager'?'selected':''}>◇ Менеджер проекта</option><option value="member" ${role==='member'?'selected':''}>∘ Участник</option><option value="guest" ${role==='guest'?'selected':''}>△ Гость</option><option value="none" ${role==='none'?'selected':''}>🚫 Нет доступа</option></select></td></tr>`}).join('')}</tbody></table></div><div class="modal-foot"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveProjectAccess('${projectId}')">Сохранить</button></div>`;
  openModal();
}

function saveProjectAccess(projectId){if(!canManageProjectAccess(projectId))return deny('Нет права управлять доступами проекта');DB.users.forEach(u=>{const sel=$('pa-'+u.id);if(sel)setProjectRole(projectId,u.id,sel.value)});saveDB();closeModal();renderSettings($('mainContent'));toast('Доступы сохранены ✓')}

function openPhaseModal(){
  if(!canManagePhases(VS.projectId))return deny('Нет права создавать фазы');
  $('modalBox').innerHTML=`<h2>Новая фаза</h2>
    <div class="field"><span class="lbl">Название</span><input id="phTitle" class="inp" placeholder="Фаза 2 · Разработка"></div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="savePhase()">Добавить</button></div>`;
  openModal();
}
function savePhase(){if(!canManagePhases(VS.projectId))return deny('Нет права создавать фазы');const title=$('phTitle').value.trim();if(!title){toast('Нужно название');return}DB.phases.push({id:uid(),projectId:VS.projectId,title,sort:pPhases().length+1});saveDB();closeModal();renderDetailMain();toast('Фаза добавлена ✓')}

function openItemModal(type='task',phaseId=''){
  if(!canCreateItem(VS.projectId))return deny('Нет права создавать задачи');
  const ph=phaseId||VS.phaseId||pPhases()[0]?.id;
  $('modalBox').innerHTML=`<h2>${type==='milestone'?'Новая веха':'Новая задача'}</h2>
    <div class="field"><span class="lbl">Название</span><input id="itTitle" class="inp" placeholder="Что нужно сделать"></div>
    <div class="field"><span class="lbl">Результат</span><textarea id="itResult" class="sel txsm" placeholder="Что должно быть на выходе"></textarea></div>
    <div class="form-2">
      <div class="field"><span class="lbl">Фаза</span><select id="itPhase" class="sel">${pPhases().map(p=>`<option value="${p.id}" ${p.id===ph?'selected':''}>${esc(p.title)}</option>`).join('')}</select></div>
      <div class="field"><span class="lbl">Ответственный</span><select id="itOwner" class="sel">${DB.users.map(u=>`<option value="${u.id}" ${u.id===CU.id?'selected':''}>${esc(u.name)}</option>`).join('')}</select></div>
      <div class="field"><span class="lbl">Начало</span><input id="itStart" type="date" class="inp" value="${today()}"></div>
      <div class="field"><span class="lbl">Срок</span><input id="itDue" type="date" class="inp" value="${today()}"></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveItem('${type}')">Создать</button></div>`;
  openModal();
}
function saveItem(type){if(!canCreateItem(VS.projectId))return deny('Нет права создавать задачи');const title=$('itTitle').value.trim();if(!title){toast('Нужно название');return}const id=uid(),phaseId=$('itPhase').value;DB.items.push({id,projectId:VS.projectId,phaseId,type,title,result:$('itResult').value,desc:'',status:'new',ownerId:$('itOwner').value,people:[],start:$('itStart').value,due:$('itDue').value,smart:['','','','',''],subtasks:[],comments:[]});VS.itemId=id;VS.phaseId=phaseId;saveDB();closeModal();renderDetailMain();toast('Создано ✓')}
function openCommentModal(){
  const i=selItem();if(!i||!canAddCommentTo(i.projectId))return deny('Нет права оставлять комментарии');
  $('modalBox').innerHTML=`<h2>Комментарий</h2><div class="field"><span class="lbl">Текст</span><textarea id="cmtText" class="sel txsm"></textarea></div><div class="modal-foot"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveComment()">Добавить</button></div>`;
  openModal();
}
function saveComment(){const i=selItem();if(!i||!canAddCommentTo(i.projectId))return deny('Нет права оставлять комментарии');const t=$('cmtText').value.trim();if(!t){toast('Нужен текст');return}i.comments=i.comments||[];i.comments.push({userId:CU.id,text:t,date:today()});saveDB();closeModal();renderDetailMain();toast('Комментарий добавлен ✓')}

// ── BOOT ─────────────────────────────────────────────────
DB=loadDB();
initLogin();
</script>
</body>
</html>
