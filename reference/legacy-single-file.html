<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Roadmap Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EFF3F8;--paper:#FFF;--paper-soft:#F4F7FB;--paper-deep:#EAF0F7;
  --ink:#12253A;--text:#2E4459;--muted:#6B84A0;--soft:#9DB4CC;
  --line:rgba(18,37,58,.10);--line-soft:rgba(18,37,58,.06);
  --blue:#1565C0;--blue2:#1976D2;--blue-soft:#DDEEFF;
  --teal:#0097A7;--green:#00897B;--green-soft:#E0F2F1;
  --red:#E53935;--red-soft:#FFEBEE;--amber:#F57C00;
  --shadow:0 1px 4px rgba(18,37,58,.08),0 6px 20px rgba(18,37,58,.09);
  --shadow-sm:0 1px 2px rgba(18,37,58,.05),0 3px 10px rgba(18,37,58,.06);
  --r:14px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button,input,select,textarea{font:inherit;cursor:pointer}
input,select,textarea{cursor:text}

/* ─ UTILITIES ─ */
.hidden{display:none!important}
.flex{display:flex;align-items:center}
.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.f1{flex:1;min-width:0}
.bold{font-weight:800}
.muted{color:var(--muted)}
.small{font-size:11px}
.ellipsis{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ─ LOGIN ─ */
#loginScreen{position:fixed;inset:0;background:linear-gradient(145deg,#E8F0FA,#EFF4FB);display:flex;align-items:center;justify-content:center;z-index:300}
.login-box{background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:36px 40px;width:400px;box-shadow:0 8px 40px rgba(18,37,58,.12)}
.login-logo{font-family:'Forum',serif;font-size:28px;background:linear-gradient(135deg,#1565C0,#0097A7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:28px}
.login-section-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;font-weight:900;color:var(--soft);margin-bottom:8px}
.user-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.user-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:12px;background:var(--paper-soft);transition:.13s;text-align:left}
.user-btn:hover{border-color:rgba(21,101,192,.3);background:#EEF4FF}
.user-btn.sel{border-color:var(--blue);background:#EEF4FF;box-shadow:0 0 0 3px rgba(21,101,192,.10)}
.user-av{width:32px;height:32px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:700;color:var(--ink)}
.user-role-tag{font-size:10px;font-weight:800;padding:1px 7px;border-radius:999px;margin-left:auto}
.tag-admin{background:var(--blue-soft);color:var(--blue)}
.tag-lead{background:#E0F2F1;color:#00695C}
.tag-member{background:#FFF3E0;color:#E65100}
.tag-viewer{background:var(--paper-deep);color:var(--muted)}
.login-btn{width:100%;height:42px;border:0;border-radius:12px;background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff;font-weight:800;font-size:14px;box-shadow:0 4px 14px rgba(21,101,192,.28);transition:.13s}
.login-btn:hover{background:linear-gradient(135deg,#1976D2,#1E88E5)}
.login-btn:disabled{opacity:.45}

/* ─ APP SHELL ─ */
#appShell{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ─ TOPBAR row 1 (always visible) ─ */
.topbar{background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;gap:4px;position:relative;z-index:30;flex-shrink:0;height:48px}
.topbar-logo{font-family:'Forum',serif;font-size:19px;background:linear-gradient(135deg,#1565C0,#0097A7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0;margin-right:8px;cursor:pointer;user-select:none}
.topbar-logo:hover{opacity:.75}
.topbar-div{width:1px;height:18px;background:var(--line);flex-shrink:0;margin:0 6px}
/* main nav tabs — static, always shown */
.mnav{display:flex;align-items:center;gap:1px}
.mtab{height:32px;border:0;background:transparent;color:var(--muted);border-radius:9px;padding:0 12px;font-weight:800;font-size:12px;transition:.12s;display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer}
.mtab:hover{background:rgba(21,101,192,.07);color:var(--ink)}
.mtab.active{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff}
.mtab-ico{display:flex;align-items:center}
/* team selector pill */
.team-btn{display:flex;align-items:center;gap:6px;height:32px;padding:0 11px;border:1px solid var(--line);border-radius:9px;background:var(--paper-soft);font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;transition:.12s;flex-shrink:0;white-space:nowrap}
.team-btn:hover{border-color:rgba(21,101,192,.3);background:#EEF4FF}
.team-btn-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.team-btn-chevron{font-size:10px;color:var(--soft)}
/* right */
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.topbar-av{width:28px;height:28px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0}
.topbar-uname{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap}

/* ─ TOPBAR row 2 — project context bar ─ */
.ctx-bar{background:rgba(248,251,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:none;align-items:center;padding:0 14px;gap:3px;height:38px;flex-shrink:0;z-index:20}
.ctx-bar.show{display:flex}
.ctx-back{height:26px;border:0;background:transparent;color:var(--muted);border-radius:7px;padding:0 7px;font-weight:800;font-size:14px;cursor:pointer;line-height:1}
.ctx-back:hover{color:var(--blue);background:rgba(21,101,192,.07)}
.ctx-proj-title{font-size:12px;font-weight:700;color:var(--ink);max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0 6px}
.vtab{height:26px;border:0;background:transparent;color:var(--muted);border-radius:7px;padding:0 9px;font-weight:800;font-size:11px;transition:.12s;cursor:pointer}
.vtab:hover{background:rgba(21,101,192,.07);color:var(--ink)}
.vtab.active{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff}
.ctx-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.topbar-search{height:24px;width:140px;background:var(--paper-soft);border:1px solid var(--line);border-radius:7px;padding:0 8px;outline:0;color:var(--ink);font-size:11px}
.topbar-search:focus{border-color:rgba(21,101,192,.4);background:#fff}

/* ─ DROPDOWN MENU ─ */
.dropdown{position:absolute;top:calc(100% + 5px);background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:0 8px 28px rgba(18,37,58,.14);z-index:100;min-width:200px;padding:6px 0;display:none}
.dropdown.open{display:block}
.dropdown-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;font-size:12px;font-weight:700;color:var(--ink);transition:.12s}
.dropdown-item:hover{background:var(--paper-soft);color:var(--blue)}
.dropdown-item.active{color:var(--blue)}
.dropdown-sep{height:1px;background:var(--line);margin:5px 0}
.dropdown-section{padding:6px 14px 3px;font-size:9px;text-transform:uppercase;letter-spacing:.12em;font-weight:900;color:var(--soft)}

/* ─ MAIN ─ */
.main-area{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
.main-content{flex:1;min-height:0;overflow:hidden}
.btn{height:30px;border:1px solid var(--line);border-radius:9px;background:var(--paper);color:var(--ink);padding:0 12px;font-weight:700;font-size:12px;display:inline-flex;align-items:center;gap:6px;transition:.13s;box-shadow:var(--shadow-sm)}
.btn:hover{background:var(--paper-soft);border-color:rgba(21,101,192,.2);transform:translateY(-1px)}
.btn.primary{background:linear-gradient(135deg,#1565C0,#1976D2);border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(21,101,192,.25)}
.btn.primary:hover{background:linear-gradient(135deg,#1976D2,#1E88E5)}
.btn.sm{height:25px;padding:0 9px;font-size:11px;border-radius:7px}
.btn.danger{background:var(--red-soft);color:var(--red);border-color:rgba(229,57,53,.15)}
.btn.ghost{background:transparent;border-color:transparent;box-shadow:none;color:var(--muted)}
.btn:disabled{opacity:.4;pointer-events:none}

/* ─ FORMS ─ */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field:last-child{margin-bottom:0}
.lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-weight:900;color:var(--soft)}
.inp,.sel,.txta{width:100%;border:1px solid var(--line);background:var(--paper-soft);border-radius:10px;padding:8px 10px;outline:0;color:var(--ink);font-size:13px;transition:.13s}
.txta{min-height:60px;resize:vertical;line-height:1.45}
.inp:focus,.sel:focus,.txta:focus{border-color:rgba(21,101,192,.4);box-shadow:0 0 0 3px rgba(21,101,192,.08);background:#fff}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-2 .field{margin-bottom:0}

/* ─ CARD ─ */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm)}

/* ─ BADGES ─ */
.badge{height:20px;border-radius:999px;padding:0 8px;display:inline-flex;align-items:center;font-size:10px;font-weight:900;white-space:nowrap}
.badge.new{background:var(--blue-soft);color:var(--blue)}
.badge.progress{background:#E0F2F1;color:#00695C}
.badge.done{background:var(--green-soft);color:var(--green)}
.badge.risk{background:var(--red-soft);color:var(--red)}
.badge.approval{background:#E0F7FA;color:var(--teal)}

/* ─ ADMIN PANEL ─ */
.admin-wrap{height:100%;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.admin-title{font-family:'Forum',serif;font-size:24px;color:var(--ink);font-weight:400}
.admin-desc{font-size:12px;color:var(--muted);margin-top:2px}

/* teams table */
.data-table{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm)}
.dt-head{display:grid;padding:10px 16px;background:var(--paper-soft);border-bottom:1px solid var(--line);font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-weight:900;color:var(--soft)}
.dt-row{display:grid;padding:10px 16px;border-bottom:1px solid var(--line-soft);align-items:center;transition:.12s}
.dt-row:last-child{border-bottom:0}
.dt-row:hover{background:var(--paper-soft)}
.dt-av{width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0}
.dt-name{font-size:13px;font-weight:700;color:var(--ink)}
.dt-sub{font-size:11px;color:var(--muted)}

/* access matrix */
.matrix-wrap{overflow-x:auto}
.matrix{border-collapse:collapse;width:100%;min-width:600px}
.matrix th,.matrix td{padding:9px 12px;border:1px solid var(--line);text-align:left;font-size:12px;vertical-align:middle}
.matrix th{background:var(--paper-soft);font-weight:900;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft)}
.matrix td:first-child{font-weight:700;color:var(--ink);white-space:nowrap}
.matrix tr:hover td{background:var(--paper-soft)}
.matrix-user{display:flex;align-items:center;gap:8px}
.access-sel{height:26px;border:1px solid var(--line);border-radius:7px;background:var(--paper-soft);padding:0 7px;font-size:11px;font-weight:700;color:var(--ink);outline:0}
.access-sel:focus{border-color:rgba(21,101,192,.4)}
.access-sel.full{color:var(--green)}
.access-sel.read{color:var(--blue)}
.access-sel.none{color:var(--soft)}


/* ─ ROLE MATRIX / PERMISSIONS ─ */
::view-transition-group(*),
::view-transition-old(*),
::view-transition-new(*){
  animation-duration:.25s;
  animation-timing-function:cubic-bezier(.19,1,.22,1);
}
.perm-shell{background:var(--paper);color:var(--text);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);overflow:hidden}
.perm-head{display:flex;align-items:flex-start;gap:16px;justify-content:space-between;margin-bottom:14px}
.perm-title{font-family:'Forum',serif;font-size:28px;font-weight:400;color:var(--ink);line-height:1.1}
.perm-sub{font-size:12px;color:var(--muted);margin-top:5px;max-width:820px}
.perm-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.perm-tab{height:30px;border:1px solid var(--line);background:var(--paper-soft);color:var(--muted);border-radius:999px;padding:0 12px;font-size:11px;font-weight:800;cursor:pointer;transition:.14s}
.perm-tab:hover{background:#EEF4FF;color:var(--ink);border-color:rgba(21,101,192,.22)}
.perm-tab.active{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(21,101,192,.20)}
.perm-toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin:0 0 12px;flex-wrap:wrap}
.perm-hint{font-size:11px;color:var(--muted);font-weight:700;background:var(--paper-soft);border:1px solid var(--line);border-radius:999px;padding:5px 9px}
.perm-role-grid{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:10px}
.perm-role-card{background:var(--paper-soft);border:1px solid var(--line);border-radius:12px;padding:13px;min-height:136px;box-shadow:var(--shadow-sm)}
.perm-role-card:hover{border-color:rgba(21,101,192,.22);background:#FAFCFF}
.perm-role-chip{display:inline-flex;align-items:center;height:20px;border-radius:999px;padding:0 8px;font-size:10px;font-weight:900;margin-bottom:9px;border:1px solid transparent}
.perm-level{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--soft);font-weight:900;margin-bottom:7px}
.perm-desc{font-size:12px;line-height:1.55;color:var(--text);font-weight:700}
.perm-table-wrap{border:1px solid var(--line);border-radius:14px;overflow:auto;background:var(--paper);box-shadow:var(--shadow-sm)}
.perm-table{width:100%;min-width:880px;border-collapse:collapse;color:var(--text)}
.perm-table th,.perm-table td{border-bottom:1px solid var(--line-soft);padding:9px 10px;font-size:12px;text-align:center;vertical-align:middle}
.perm-table th:first-child,.perm-table td:first-child{text-align:left;width:330px;font-weight:800;color:var(--ink)}
.perm-table th{position:sticky;top:0;z-index:2;background:var(--paper-soft);color:var(--muted);font-size:10px;font-weight:900;white-space:nowrap;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.05em}
.perm-table tr:hover td{background:#FAFCFF}
.perm-section-row td{background:var(--paper-deep)!important;color:var(--soft)!important;font-size:10px!important;text-transform:uppercase;letter-spacing:.11em;font-weight:900;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.perm-action-key{display:block;font-size:9px;color:var(--soft);font-weight:800;margin-top:2px;letter-spacing:.02em}
.perm-cell{display:flex;align-items:center;justify-content:center;gap:6px;min-height:28px}
.perm-check{width:15px;height:15px;accent-color:var(--blue);cursor:pointer}
.perm-check:disabled{opacity:.45;cursor:not-allowed}
.perm-scope{height:24px;max-width:82px;border:1px solid var(--line);border-radius:7px;background:var(--paper-soft);color:var(--muted);font-size:10px;font-weight:800;padding:0 4px;outline:0}
.perm-scope:focus{border-color:rgba(21,101,192,.35);background:#fff}
.perm-lock{font-size:10px;color:var(--soft);font-weight:900}
.perm-auto{display:inline-flex;align-items:center;gap:5px;color:var(--green);font-size:11px;font-weight:900}
.perm-foot{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;color:var(--muted);font-size:11px;font-weight:700}
.perm-note{display:inline-flex;align-items:center;gap:5px;background:var(--paper-soft);border:1px solid var(--line);border-radius:999px;padding:5px 8px}
.perm-note i{font-style:normal;font-weight:900;color:var(--blue)}
.perm-ok{color:var(--green);font-size:17px;font-weight:900}
.perm-no{color:var(--soft);font-size:16px;font-weight:900}
.perm-partial{color:var(--amber);font-size:15px;font-weight:900}
.perm-own{color:var(--blue);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.03em}
@media(max-width:900px){.perm-head{flex-direction:column}.perm-tabs{justify-content:flex-start}.perm-role-grid{grid-template-columns:1fr}.perm-shell{padding:12px}}

/* ─ TEAM VIEW ─ */
.team-header{padding:16px 20px 0;flex-shrink:0}
.team-logo{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0}
.team-name{font-family:'Forum',serif;font-size:22px;color:var(--ink);font-weight:400}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px}
.proj-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);cursor:pointer;position:relative;overflow:hidden;transition:.15s}
.proj-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px;background:linear-gradient(90deg,#1565C0,#29B6F6,#0097A7);border-radius:var(--r) var(--r) 0 0}
.proj-card:hover{transform:translateY(-2px);border-color:rgba(21,101,192,.22);box-shadow:0 6px 24px rgba(18,37,58,.12)}
.proj-title{font-family:'Forum',serif;font-size:18px;color:var(--ink);font-weight:400;margin:8px 0 4px}
.proj-desc{font-size:11px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.proj-footer{margin-top:10px;padding-top:8px;border-top:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between}
.pbar{height:3px;background:rgba(21,101,192,.10);border-radius:999px;overflow:hidden;margin-top:5px}
.pbar span{display:block;height:100%;background:linear-gradient(90deg,#1565C0,#29B6F6);border-radius:999px}
.pav{width:20px;height:20px;border-radius:999px;background:linear-gradient(135deg,#1565C0,#29B6F6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900;border:2px solid #fff}
.pav+.pav{margin-left:-5px}

/* ─ PROJECT DETAIL ─ */
.detail-shell{margin:0;flex:1;min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.dhead{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:#fff}
.dtitle{font-family:'Forum',serif;font-size:20px;color:var(--ink);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ddesc{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vtabs{height:42px;border-bottom:1px solid var(--line);background:var(--paper-soft);display:flex;align-items:center;padding:0 10px;gap:3px}
.vtab{height:28px;border:0;background:transparent;color:var(--muted);border-radius:7px;padding:0 9px;font-weight:800;font-size:11px;transition:.12s}
.vtab:hover{background:rgba(21,101,192,.07);color:var(--ink)}
.vtab.active{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff}
.vtab-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.tsearch{width:160px;height:26px;border:1px solid var(--line);background:var(--paper);border-radius:7px;padding:0 8px;outline:0;color:var(--ink);font-size:11px}
.dcontent{min-height:0;height:100%}

/* table view */
.cgrid{height:100%;display:grid;grid-template-columns:minmax(0,1fr) minmax(420px,36%);min-height:0}
.lpane{min-width:0;min-height:0;border-right:1px solid var(--line);overflow:hidden;display:flex;flex-direction:column}
.rpane{min-height:0;overflow-y:auto;overflow-x:hidden;background:var(--paper-soft)}
.planner{flex:1;min-height:0;display:grid;grid-template-columns:190px minmax(0,1fr)}
.phase-rail{min-height:0;overflow-y:auto;border-right:1px solid var(--line);background:var(--paper-deep);padding:10px;scrollbar-width:none}
.phase-rail::-webkit-scrollbar{display:none}
.prail-title{font-size:9px;text-transform:uppercase;letter-spacing:.12em;font-weight:900;color:var(--soft);margin-bottom:7px}
.pvtoggle{display:grid;grid-template-columns:1fr 1fr;background:rgba(21,101,192,.07);border-radius:10px;padding:3px;gap:3px;margin-bottom:8px}
.pvtoggle button{height:24px;border:0;border-radius:7px;background:transparent;color:var(--muted);font-size:11px;font-weight:800}
.pvtoggle button.active{background:var(--paper);color:var(--blue);box-shadow:var(--shadow-sm)}
.pcard{width:100%;text-align:left;border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:8px;margin-bottom:6px;transition:.12s;box-shadow:var(--shadow-sm)}
.pcard:hover{border-color:rgba(21,101,192,.22)}
.pcard.active{background:#EEF4FF;border-color:rgba(21,101,192,.28);box-shadow:inset 3px 0 0 var(--blue),var(--shadow-sm)}
.pname{font-size:11px;font-weight:800;color:var(--ink)}
.pmeta{font-size:10px;color:var(--muted);font-weight:700;margin-top:3px}
.task-area{min-width:0;min-height:0;overflow-y:auto;overflow-x:hidden;background:#FAFCFF}
.thead{display:grid;grid-template-columns:minmax(200px,1.4fr) minmax(140px,1fr) 82px 82px 74px;gap:7px;height:36px;position:sticky;top:0;z-index:5;background:rgba(255,255,255,.97);border-bottom:1px solid var(--line);padding:0 10px;font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--soft);font-weight:900;align-items:center}
.pstrip{height:32px;position:sticky;top:36px;z-index:4;display:flex;align-items:center;gap:7px;padding:0 10px;background:linear-gradient(90deg,#DDEEFF,rgba(255,255,255,.97));border-bottom:1px solid var(--line);font-size:11px;color:var(--ink);font-weight:800}
.pstrip span:last-child{margin-left:auto;font-size:10px;color:var(--muted)}
.trow{display:grid;grid-template-columns:minmax(200px,1.4fr) minmax(140px,1fr) 82px 82px 74px;gap:7px;min-height:48px;padding:7px 10px;border-bottom:1px solid var(--line-soft);cursor:pointer;transition:.12s;align-items:center}
.trow:hover{background:#F0F6FF}
.trow.active{background:#EEF4FF;box-shadow:inset 3px 0 0 var(--blue)}
.tmain{display:grid;grid-template-columns:7px minmax(0,1fr);gap:7px;min-width:0;align-items:start}
.dot{width:7px;height:7px;border-radius:999px;margin-top:3px;background:var(--blue);flex-shrink:0}
.dot.milestone{background:var(--teal)}.dot.risk{background:var(--red)}.dot.done{background:var(--green)}
.ttitle{font-size:12px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tsub{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tres{font-size:11px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tdate{font-size:10px;color:var(--text);font-weight:700;line-height:1.35}
.avs{display:flex}
.tav{width:19px;height:19px;border-radius:999px;background:linear-gradient(135deg,#1565C0,#29B6F6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900;border:2px solid #fff}
.tav+.tav{margin-left:-5px}

/* editor */
.editor{padding:12px;display:grid;gap:9px;align-content:start}
.ehero{background:#fff;border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:13px;padding:12px;box-shadow:var(--shadow-sm)}
.ekicker{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.etitle{font-family:'Forum',serif;font-size:20px;color:var(--ink);font-weight:400}
.esec{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px;box-shadow:var(--shadow-sm)}
.esec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.esec-title{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--soft);font-weight:900}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.fsm{display:flex;flex-direction:column;gap:4px}
.fsm.full{grid-column:1/-1}
.lsm{font-size:9px;text-transform:uppercase;letter-spacing:.09em;font-weight:900;color:var(--soft)}
.isml{width:100%;border:1px solid var(--line);background:var(--paper-soft);border-radius:9px;padding:6px 8px;outline:0;color:var(--ink);font-size:12px}
.isml:focus{border-color:rgba(21,101,192,.4);box-shadow:0 0 0 3px rgba(21,101,192,.07);background:#fff}
.txsm{min-height:50px;resize:vertical;line-height:1.4}
.sub-row{display:grid;grid-template-columns:16px minmax(0,1fr) 96px 22px;gap:5px;align-items:center;border:1px solid var(--line);border-radius:9px;padding:5px;margin-bottom:4px;background:var(--paper-soft)}
.chk{width:14px;height:14px;accent-color:var(--blue)}
.mini-inp{border:0;outline:0;background:transparent;color:var(--ink);font-size:12px;width:100%}
.mini-date{height:22px;border:1px solid var(--line);border-radius:7px;background:var(--paper);padding:0 6px;font-size:10px;color:var(--muted)}
.mini-del{border:0;background:transparent;color:var(--soft);font-size:13px;border-radius:5px;padding:0;line-height:1}
.mini-del:hover{background:var(--red-soft);color:var(--red)}
.smart-row{display:grid;grid-template-columns:24px minmax(0,1fr);gap:7px;align-items:start;margin-bottom:7px}
.sletter{width:22px;height:22px;border-radius:7px;background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:9px}
.smeta{font-size:9px;color:var(--muted);font-weight:800;margin-bottom:3px}
.cmt{border:1px solid var(--line);background:var(--paper-soft);border-radius:9px;padding:7px 9px;margin-bottom:5px}
.cmt strong{font-size:11px}.cmt p{font-size:12px;color:var(--muted);margin-top:2px}.cmt small{font-size:10px;color:var(--soft)}

/* kanban */
.kb-wrap{height:100%;overflow:auto;padding:12px;background:#FAFCFF}
.kb-grid{display:grid;grid-template-columns:repeat(5,minmax(190px,1fr));gap:10px;height:100%}
.kb-col{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:10px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;min-height:0}
.kb-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;padding-bottom:7px;border-bottom:2px solid var(--line);flex-shrink:0}
.kb-lbl{font-size:11px;font-weight:900;color:var(--ink)}
.kb-cnt{font-size:10px;font-weight:800;background:var(--paper-soft);border:1px solid var(--line);border-radius:999px;padding:1px 7px;color:var(--muted)}
.kb-body{overflow-y:auto;flex:1;scrollbar-width:thin}
.kb-card{background:var(--paper-soft);border:1px solid var(--line);border-radius:9px;padding:8px;margin-bottom:5px;cursor:pointer;transition:.12s}
.kb-card:hover{background:#EEF4FF;border-color:rgba(21,101,192,.22)}
.kb-title{font-size:11px;font-weight:700;color:var(--ink);margin-bottom:4px}
.kb-phase{font-size:9px;font-weight:800;background:var(--blue-soft);color:var(--blue);border-radius:4px;padding:1px 5px;display:inline-block;margin-bottom:3px}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(18,37,58,.25);backdrop-filter:blur(5px);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 16px 56px rgba(18,37,58,.14);width:480px;max-width:100%}
.modal h2{font-family:'Forum',serif;font-size:24px;font-weight:400;color:var(--ink);margin-bottom:16px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--line)}

/* toast */
.toast{position:fixed;right:18px;bottom:18px;background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff;border-radius:12px;padding:9px 14px;font-size:12px;font-weight:800;box-shadow:0 5px 18px rgba(21,101,192,.28);display:none;z-index:200}
.toast.show{display:block}

/* empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:10px;text-align:center}
.empty-ico{font-size:36px;opacity:.2}
.empty-t{font-size:15px;font-weight:800;color:var(--ink)}
.empty-s{font-size:12px;color:var(--muted);max-width:300px}

/* scrollable page */
.page-scroll{height:100%;overflow-y:auto;padding:16px 20px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Roadmap Studio</div>
    <div class="login-sub">Управление командами и проектами</div>
    <div class="login-section-label">Выберите пользователя</div>
    <div class="user-list" id="userList"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()" disabled>Войти →</button>
  </div>
</div>

<!-- APP -->
<div id="appShell" class="hidden">

  <!-- ROW 1: main nav always visible -->
  <header class="topbar" id="topbar">
    <div class="topbar-logo" onclick="gotoHome()">Roadmap Studio</div>
    <div class="topbar-div"></div>

    <!-- static main nav -->
    <nav class="mnav" id="mainNav">
      <button class="mtab" id="mnav-projects" onclick="gotoTeamView()">
        <span class="mtab-ico"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".35"/></svg></span>
        Карты проектов
      </button>
      <button class="mtab" id="mnav-overview" onclick="gotoOverview()">
        <span class="mtab-ico"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="4" height="14" rx="1.5" fill="currentColor" opacity=".9"/><rect x="6" y="1" width="4" height="9" rx="1.5" fill="currentColor" opacity=".7"/><rect x="11" y="1" width="4" height="12" rx="1.5" fill="currentColor" opacity=".5"/></svg></span>
        Обзор
      </button>
      <button class="mtab" id="mnav-people" onclick="gotoPeople()">
        <span class="mtab-ico"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="3" fill="currentColor" opacity=".9"/><path d="M1 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".9"/><circle cx="12.5" cy="4.5" r="2" fill="currentColor" opacity=".5"/><path d="M14.5 11.5c0-1.66-1-3-2.5-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity=".5"/></svg></span>
        Люди
      </button>
    </nav>

    <div class="topbar-div"></div>

    <div class="topbar-right" id="topbarRight">
      <!-- My tasks pill -->
      <button class="mtab" id="mnav-mytasks" onclick="gotoMyTasks()" style="height:28px;padding:0 10px;border:1px solid var(--line);border-radius:999px;font-size:11px;background:var(--paper-soft)">
        <span style="font-size:12px">☑</span> Мои задачи
      </button>
      <!-- Settings button -->
      <button class="mtab" id="mnav-settings" onclick="gotoSettings()" style="height:28px;padding:0 10px;border:1px solid var(--line);border-radius:999px;font-size:11px;background:var(--paper-soft)">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.4 3.4l.7.7M11.9 11.9l.7.7M3.4 12.6l.7-.7M11.9 4.1l.7-.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Настройки
      </button>
      <div class="topbar-div"></div>
      <!-- Avatar — only logout in dropdown -->
      <div style="position:relative">
        <button onclick="toggleDropdown('userDrop')" style="display:flex;align-items:center;gap:7px;border:0;background:transparent;padding:2px 4px;border-radius:8px;cursor:pointer;transition:.12s" onmouseover="this.style.background='var(--paper-soft)'" onmouseout="this.style.background='transparent'">
          <div class="topbar-av" id="topAv"></div>
          <span id="topName" class="topbar-uname"></span>
        </button>
        <div class="dropdown" id="userDrop" style="right:0;left:auto;min-width:140px">
          <div class="dropdown-item" onclick="logout()" style="color:var(--red)">← Выйти</div>
        </div>
      </div>
    </div>
  </header>

  <!-- ROW 2: project context bar (shown only inside a project) -->
  <div class="ctx-bar" id="ctxBar">
    <button class="ctx-back" onclick="backToTeam()">‹</button>
    <span class="ctx-proj-title" id="ctxTitle"></span>
    <div style="width:1px;height:14px;background:var(--line);margin:0 4px"></div>
    <div id="ctxTabs" style="display:flex;align-items:center;gap:2px"></div>
    <div class="ctx-right" id="ctxRight"></div>
  </div>

  <div class="main-area">
    <div class="main-content" id="mainContent"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>
<div class="toast" id="toastEl"></div>

<script>
// ── UTILS ────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4);
const today=()=>new Date().toISOString().slice(0,10);
const fmt=d=>d?new Date(d+'T00:00:00').toLocaleDateString('ru-RU',{day:'2-digit',month:'short'}):'—';
const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const $=id=>document.getElementById(id);
const toast=msg=>{const e=$('toastEl');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800)};
const openModal=()=>$('modalBg').classList.add('open');
const closeModal=()=>$('modalBg').classList.remove('open');


// ── ROLE / ACCESS MATRIX ─────────────────────────────────
const ROLE_DEFS=[
  {id:'superadmin',icon:'○',name:'Суперадмин',level:'Платформа',tone:'#E8E6FF',ink:'#2D2B75',desc:'Полный контроль над всем. Управляет пользователями, командами, ролями, настройками системы. Видит всё. Эта роль зафиксирована как страховка от самоблокировки.'},
  {id:'admin',icon:'◈',name:'Администратор',level:'Платформа',tone:'#E3F1FF',ink:'#175A8F',desc:'Управляет командами и пользователями. Может создавать команды и назначать руководителей. Не меняет роль суперадмина.'},
  {id:'teamLead',icon:'◆',name:'Руководитель команды',level:'Команда',tone:'#E0F2F1',ink:'#00695C',desc:'Управляет своей командой: добавляет участников, создаёт проекты, назначает менеджеров, видит проекты команды.'},
  {id:'projectManager',icon:'◇',name:'Менеджер проекта',level:'Проект',tone:'#DDEEFF',ink:'#1565C0',desc:'Управляет конкретным проектом: создаёт фазы, задачи, назначает участников, меняет статусы, управляет доступом к проекту.'},
  {id:'member',icon:'∘',name:'Участник',level:'Проект',tone:'#F4F7FB',ink:'#2E4459',desc:'Работает с задачами в проектах, куда добавлен. Обычно редактирует свои задачи и оставляет комментарии.'},
  {id:'guest',icon:'△',name:'Гость',level:'Проект',tone:'#F4F7FB',ink:'#6B84A0',desc:'Видит только то, что явно разрешено на уровне проекта. По умолчанию — только чтение.'}
];
const ROLE_COLS=[
  {id:'superadmin',label:'○ Супер'},
  {id:'admin',label:'◈ Админ'},
  {id:'teamLead',label:'◆ Рук.'},
  {id:'projectManager',label:'◇ Менеджер'},
  {id:'member',label:'∘ Участник'},
  {id:'guest',label:'△ Гость'}
];
const PERMISSION_TABS=[['roles','Роли'],['platform','Платформа'],['team','Команда'],['project','Проект']];
const PERMISSION_ACTIONS=[
  {scope:'platform',group:'Пользователи',key:'platform.users.create',label:'Создать пользователя'},
  {scope:'platform',group:'Пользователи',key:'platform.users.edit',label:'Редактировать профиль пользователя'},
  {scope:'platform',group:'Пользователи',key:'platform.users.delete',label:'Удалить пользователя',limited:true},
  {scope:'platform',group:'Пользователи',key:'platform.roles.assign',label:'Назначить роль платформы',limited:true},
  {scope:'platform',group:'Пользователи',key:'platform.password.reset',label:'Сбросить / изменить пароль'},
  {scope:'platform',group:'Команды',key:'platform.teams.create',label:'Создать команду'},
  {scope:'platform',group:'Команды',key:'platform.teams.delete',label:'Удалить команду',limited:true},
  {scope:'platform',group:'Команды',key:'platform.teams.assignLead',label:'Назначить руководителя команды'},
  {scope:'platform',group:'Команды',key:'platform.teams.viewAll',label:'Видеть все команды платформы'},
  {scope:'platform',group:'Система',key:'platform.settings.edit',label:'Изменить настройки платформы'},
  {scope:'platform',group:'Система',key:'platform.audit.view',label:'Видеть аудит-лог'},
  {scope:'platform',group:'Система',key:'platform.data.reset',label:'Сброс данных'},

  {scope:'team',group:'Участники команды',key:'team.members.add',label:'Добавить участника в команду'},
  {scope:'team',group:'Участники команды',key:'team.members.remove',label:'Удалить участника из команды'},
  {scope:'team',group:'Участники команды',key:'team.members.role',label:'Изменить роль в команде'},
  {scope:'team',group:'Участники команды',key:'team.members.view',label:'Видеть всех участников команды',limited:true},
  {scope:'team',group:'Проекты команды',key:'team.project.create',label:'Создать проект в команде'},
  {scope:'team',group:'Проекты команды',key:'team.project.delete',label:'Архивировать / удалить проект'},
  {scope:'team',group:'Проекты команды',key:'team.project.viewAll',label:'Видеть список всех проектов',limited:true},
  {scope:'team',group:'Проекты команды',key:'team.project.access.manage',label:'Управлять доступами к проектам'},
  {scope:'team',group:'Настройки команды',key:'team.rename',label:'Переименовать команду'},

  {scope:'project',group:'Структура проекта',key:'project.phase.manage',label:'Создать / удалить фазу'},
  {scope:'project',group:'Структура проекта',key:'project.task.create',label:'Создать задачу / веху / риск'},
  {scope:'project',group:'Структура проекта',key:'project.task.edit.any',label:'Редактировать любую задачу'},
  {scope:'project',group:'Структура проекта',key:'project.task.edit.own',label:'Редактировать свои задачи',ownable:true},
  {scope:'project',group:'Структура проекта',key:'project.task.delete',label:'Удалить задачу'},
  {scope:'project',group:'Структура проекта',key:'project.task.status',label:'Менять статус задачи',ownable:true},
  {scope:'project',group:'Структура проекта',key:'project.subtasks.add',label:'Добавлять подзадачи',ownable:true},
  {scope:'project',group:'Структура проекта',key:'project.comments.add',label:'Оставлять комментарии'},
  {scope:'project',group:'Просмотр',key:'project.view',label:'Видеть проект и все задачи'},
  {scope:'project',group:'Просмотр',key:'project.comments.view',label:'Видеть комментарии'},
  {scope:'project',group:'Просмотр',key:'project.export',label:'Экспортировать данные'},
  {scope:'project',group:'Доступы',key:'project.members.add',label:'Добавить участника в проект'},
  {scope:'project',group:'Доступы',key:'project.members.role',label:'Изменить роль в проекте'},
  {scope:'project',group:'Доступы',key:'project.members.remove',label:'Удалить участника из проекта'}
];
const DEFAULT_ROLE_PERMISSIONS={
  superadmin:{},admin:{},teamLead:{},projectManager:{},member:{},guest:{}
};
PERMISSION_ACTIONS.forEach(a=>{
  DEFAULT_ROLE_PERMISSIONS.superadmin[a.key]='yes';
  DEFAULT_ROLE_PERMISSIONS.admin[a.key]=a.scope==='platform'||a.scope==='team'||a.scope==='project'?'yes':'no';
  DEFAULT_ROLE_PERMISSIONS.teamLead[a.key]=a.scope==='team'||a.scope==='project'?'yes':'no';
  DEFAULT_ROLE_PERMISSIONS.projectManager[a.key]=a.scope==='project'?'yes':'no';
  DEFAULT_ROLE_PERMISSIONS.member[a.key]=['project.task.create','project.task.edit.own','project.task.status','project.subtasks.add','project.comments.add','project.view','project.comments.view'].includes(a.key)?(a.ownable&&['project.task.status','project.subtasks.add'].includes(a.key)?'own':'yes'):'no';
  DEFAULT_ROLE_PERMISSIONS.guest[a.key]=['project.view','project.comments.view'].includes(a.key)?'yes':'no';
});
['platform.users.delete','platform.roles.assign','platform.teams.delete'].forEach(k=>DEFAULT_ROLE_PERMISSIONS.admin[k]='partial');
['team.members.view','team.project.viewAll'].forEach(k=>{DEFAULT_ROLE_PERMISSIONS.projectManager[k]='partial';DEFAULT_ROLE_PERMISSIONS.member[k]='partial';DEFAULT_ROLE_PERMISSIONS.guest[k]='partial'});
DEFAULT_ROLE_PERMISSIONS.member['project.export']='no';
DEFAULT_ROLE_PERMISSIONS.guest['project.comments.add']='no';

function clone(obj){return JSON.parse(JSON.stringify(obj))}
function defaultRolePermissions(){return clone(DEFAULT_ROLE_PERMISSIONS)}
function migrateDB(db){
  db=db||structuredClone(SEED);
  db.users=db.users||[];db.teams=db.teams||[];db.projects=db.projects||[];db.phases=db.phases||[];db.items=db.items||[];
  let hasSuper=db.users.some(u=>u.platformRole==='superadmin');
  db.users.forEach((u,i)=>{
    if(!u.platformRole)u.platformRole='user';
    if(!hasSuper&&i===0&&['admin','superadmin'].includes(u.platformRole)){u.platformRole='superadmin';hasSuper=true}
    if(u.$password&&!u.password)u.password=u.$password;
  });
  db.projects.forEach(p=>{
    p.access=p.access||[];
    p.access=p.access.filter(a=>a&&a.userId);
    p.access.forEach(a=>{
      if(!a.role){a.role=a.level==='full'?'projectManager':a.level==='read'?'guest':'none'}
      if(a.role==='projectManager')a.level='full';
      else if(a.role==='member'||a.role==='guest')a.level='read';
      else if(a.role==='none')a.level='none';
      else if(!a.level)a.level='none';
    });
  });
  db.rolePermissions=db.rolePermissions||defaultRolePermissions();
  ROLE_COLS.forEach(r=>{db.rolePermissions[r.id]=Object.assign({},DEFAULT_ROLE_PERMISSIONS[r.id],db.rolePermissions[r.id]||{})});
  return db;
}

function roleMeta(roleId){return ROLE_DEFS.find(r=>r.id===roleId)||ROLE_DEFS[5]}
function platformRoleLabel(role){return role==='superadmin'?'Суперадмин':role==='admin'?'Администратор':'Пользователь'}
function isSuperAdmin(user=CU){return user?.platformRole==='superadmin'}
function isPlatformAdmin(user=CU){return ['superadmin','admin'].includes(user?.platformRole)}
function teamRoleForUser(teamId,userId){
  const t=DB.teams.find(x=>x.id===teamId);
  const r=t?.members.find(m=>m.userId===userId)?.role;
  return r==='lead'?'teamLead':r==='member'?'member':null;
}
function projectRoleForUser(projectId,userId){
  const u=DB.users.find(x=>x.id===userId);if(!u)return null;
  if(u.platformRole==='superadmin')return'superadmin';
  if(u.platformRole==='admin')return'admin';
  const p=DB.projects.find(x=>x.id===projectId);if(!p)return null;
  const tr=teamRoleForUser(p.teamId,userId);
  if(tr==='teamLead')return'teamLead';
  const a=p.access?.find(x=>x.userId===userId);
  if(!a||a.role==='none'||a.level==='none')return null;
  if(a.role)return a.role;
  if(a.level==='full')return'projectManager';
  if(a.level==='read')return'guest';
  return null;
}

function rolePerm(roleId,key){return DB?.rolePermissions?.[roleId]?.[key]??DEFAULT_ROLE_PERMISSIONS?.[roleId]?.[key]??'no'}
function canOwn(item,userId=CU?.id){return !!item&&(item.ownerId===userId||item.people?.includes(userId))}
function hasPermission(key,ctx={}){
  if(!CU)return false;
  let role=CU.platformRole==='superadmin'?'superadmin':CU.platformRole==='admin'?'admin':null;
  if(ctx.projectId)role=projectRoleForUser(ctx.projectId,CU.id)||role;
  else if(ctx.teamId)role=teamRoleForUser(ctx.teamId,CU.id)||role;
  if(!role)return false;
  const val=rolePerm(role,key);
  if(val==='yes')return true;
  if(val==='own')return canOwn(ctx.item,CU.id);
  if(val==='partial'){
    if(key==='team.project.viewAll')return ctx.projectId?projectAccess(ctx.projectId,CU.id)!=='none':isPlatformAdmin(CU);
    if(key==='team.members.view')return !!teamRoleForUser(ctx.teamId,CU.id)||isPlatformAdmin(CU);
    if(['platform.users.delete','platform.roles.assign'].includes(key)){
      const target=ctx.user||DB.users.find(u=>u.id===ctx.userId);
      return !!target && target.platformRole!=='superadmin' && target.id!==CU.id && !(target.platformRole==='admin'&&CU.platformRole==='admin');
    }
    if(key==='platform.teams.delete')return isSuperAdmin(CU)||CU.platformRole==='admin';
    if(ctx.projectId)return projectAccess(ctx.projectId,CU.id)!=='none';
    if(ctx.teamId)return !!teamRoleForUser(ctx.teamId,CU.id)||isPlatformAdmin(CU);
    return true;
  }
  return false;
}
function projectRoleLabel(role){return role==='projectManager'?'Менеджер проекта':role==='member'?'Участник':role==='guest'?'Гость':role==='none'?'Нет доступа':'—'}
function projectRoleToLevel(role){return role==='projectManager'?'full':role==='member'||role==='guest'?'read':'none'}
function levelToProjectRole(level){return level==='full'?'projectManager':level==='read'?'guest':'none'}
function syncAccessRecord(a){if(!a)return a;if(!a.role)a.role=levelToProjectRole(a.level);a.level=projectRoleToLevel(a.role);return a}
function setProjectRole(projectId,userId,role){
  const p=DB.projects.find(x=>x.id===projectId);if(!p)return;
  p.access=p.access||[];
  let a=p.access.find(x=>x.userId===userId);
  if(!a){a={userId,role,level:projectRoleToLevel(role)};p.access.push(a)}
  else{a.role=role;a.level=projectRoleToLevel(role)}
  syncAccessRecord(a);
}

function renderPermissionEditor(scope){
  const rows=PERMISSION_ACTIONS.filter(a=>a.scope===scope);
  const grouped={};rows.forEach(a=>{(grouped[a.group]=grouped[a.group]||[]).push(a)});
  return`<div>

  </div>`;
}
function renderPermissionCell(roleId,action){
  const val=rolePerm(roleId,action.key);
  const checked=val!=='no';
  const disabled=roleId==='superadmin';
  const checkVal=action.ownable?(checked?val:'own'):action.limited?(checked?val:'partial'):'yes';
  const cb=`<input class="perm-check" type="checkbox" ${checked?'checked':''} ${disabled?'disabled':''} onchange="setRolePermission('${roleId}','${action.key}',this.checked?'${checkVal}':'no');renderSettings($('mainContent'))">`;
  const sel=(checked&&!disabled&&(action.ownable||action.limited))?`<select class="perm-scope" onchange="setRolePermission('${roleId}','${action.key}',this.value);renderSettings($('mainContent'))">
      ${action.ownable?`<option value="yes" ${val==='yes'?'selected':''}>все</option><option value="own" ${val==='own'?'selected':''}>свои</option>`:''}
      ${action.limited?`<option value="yes" ${val==='yes'?'selected':''}>все</option><option value="partial" ${val==='partial'?'selected':''}>частично</option>`:''}
    </select>`:'';
  return`<div class="perm-cell">${cb}${disabled?'<span class="perm-lock">lock</span>':sel}</div>`;
}

function projectAccess(projectId,userId){
  const p=DB.projects.find(x=>x.id===projectId);
  const u=DB.users.find(x=>x.id===userId)||CU;
  if(!p||!u)return'none';
  if(isPlatformAdmin(u))return'full';
  if(teamRoleForUser(p.teamId,userId)==='teamLead')return'full';
  const a=p.access?.find(x=>x.userId===userId);
  if(!a||a.role==='none'||a.level==='none')return'none';
  if(a.role==='projectManager'||a.level==='full')return'full';
  if(['member','guest'].includes(a.role)||a.level==='read')return'read';
  return 'none';
}

function canEdit(projectId){return hasPermission('project.task.edit.any',{projectId})||hasPermission('project.phase.manage',{projectId})||hasPermission('project.members.role',{projectId})}

function visibleProjects(teamId){return DB.projects.filter(p=>p.teamId===teamId&&(hasPermission('team.project.viewAll',{teamId,projectId:p.id})||hasPermission('project.view',{projectId:p.id})||projectAccess(p.id,CU?.id)!=='none'))}

function myTeams(){
  if(isPlatformAdmin(CU))return DB.teams;
  return DB.teams.filter(t=>t.members.some(m=>m.userId===CU?.id));
}
function teamRole(teamId){
  if(CU?.platformRole==='superadmin')return'superadmin';
  if(CU?.platformRole==='admin')return'admin';
  const r=teamRoleForUser(teamId,CU?.id);
  return r==='teamLead'?'lead':r==='member'?'member':null;
}

function renderOverview(el){

  const allProj=myTeams().flatMap(t=>visibleProjects(t.id));

  const phaseById=Object.fromEntries(DB.phases.map(p=>[p.id,p.title]));
  const projById=Object.fromEntries(DB.projects.map(p=>[p.id,p]));
  const total=allItems.length||1,done=allItems.filter(i=>i.status==='done').length;

            <span style="font-size:12px;font-weight:900;color:var(--ink)">${l}</span>
            <span style="font-size:10px;font-weight:800;color:var(--muted);background:var(--paper-soft);border:1px solid var(--line);border-radius:999px;padding:1px 7px">${arr.length}</span>

          ${arr.length===0?`<div style="font-size:11px;color:var(--soft);text-align:center;padding:12px 0;font-style:italic">Нет задач</div>`:''}

function projCardHtml(p){
  const items=DB.items.filter(i=>i.projectId===p.id);
  const pct=items.length?Math.round(items.filter(i=>i.status==='done').length/items.length*100):0;

  el.innerHTML=`<div style="display:flex;flex-direction:column;height:100%;overflow:hidden;padding:12px 16px 14px">
    <div class="detail-shell">
      <div class="dhead" style="padding:9px 14px">
        <div class="f1"><div class="dtitle">${esc(p.title)}</div><div class="ddesc">${esc(p.desc)} · ${esc(p.horizon)}</div></div>

      </div>

}

function setTab(t){VS.tab=t;document.querySelectorAll('.vtab[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));renderDetailMain()}

function pPhases(){return DB.phases.filter(p=>p.projectId===VS.projectId).sort((a,b)=>a.sort-b.sort)}
function pItems(){let arr=DB.items.filter(i=>i.projectId===VS.projectId);const q=VS.taskSearch.toLowerCase().trim();if(q)arr=arr.filter(i=>[i.title,i.result,i.desc].join(' ').toLowerCase().includes(q));return arr}
function selItem(){return DB.items.find(i=>i.id===VS.itemId)||pItems()[0]}
const slabel={new:'Не начато',progress:'В работе',approval:'Согласование',risk:'Риск',done:'Готово'};
const tlabel={task:'Задача',milestone:'Веха',risk:'Риск',decision:'Решение'};
const bdg=s=>`<span class="badge ${s}">${slabel[s]||s}</span>`;
function upItem(k,v){const i=selItem();if(!i)return;if(!canEditItemField(i,k))return deny('Нет права изменять эту задачу');i[k]=v;saveDB();renderDetailMain()}
function selectItem(id){VS.itemId=id;const i=DB.items.find(x=>x.id===id);if(i)VS.phaseId=i.phaseId;renderDetailMain()}

function renderDetailMain(){
  const v=VS.tab;
  if(v==='table')renderTable();
  else if(v==='kanban')renderKanban2();
  else if(v==='gantt')renderGantt();
  else if(v==='roadmap')renderRoadmap();
  else if(v==='calendar')renderCalendar();
  else if(v==='analytics')renderAnalytics();
}

  let rail=`<div class="prail-title">Фазы проекта</div>
  <div class="pvtoggle"><button class="${VS.phaseView==='selected'?'active':''}" onclick="VS.phaseView='selected';renderDetailMain()">Одна</button><button class="${VS.phaseView==='all'?'active':''}" onclick="VS.phaseView='all';renderDetailMain()">Все</button></div>
  <button class="pcard ${VS.phaseView==='all'?'active':''}" onclick="VS.phaseView='all';renderDetailMain()"><div class="pname">Все фазы</div><div class="pmeta">${pItems().length} задач</div></button>

    arr.forEach(i=>{
      const cls=i.status==='done'?'done':i.type==='milestone'?'milestone':i.status==='risk'||i.type==='risk'?'risk':'';
      const uIds=[...new Set([i.ownerId,...(i.people||[])].filter(Boolean))].slice(0,3);
      main+=`<div class="trow ${VS.itemId===i.id?'active':''}" onclick="selectItem('${i.id}')">
        <div class="tmain"><div class="dot ${cls}" style="margin-top:3px;flex-shrink:0"></div><div><div class="ttitle">${esc(i.title)}</div><div class="tsub">${tlabel[i.type]||'Задача'} · ${U(i.ownerId).name}</div></div></div>
        <div class="tres">${esc(i.result||'')}</div>
        <div class="tdate">${fmt(i.start)}<br>${fmt(i.due)}</div>
        <div class="avs">${uIds.map(id=>{const u=U(id);return`<div class="tav" style="background:${u.color}" title="${esc(u.name)}">${esc(u.initials)}</div>`}).join('')}</div>
        <div>${bdg(i.status)}</div>
      </div>`;
    });
  });

  const si=selItem();
  const ce2=canEditItem(si);
    const canCom=si?canAddCommentTo(si.projectId):false;
    const canSeeCom=si?canViewComments(si.projectId):false;
  let editor='<div style="padding:18px;color:var(--muted);font-size:12px">Выберите задачу</div>';
  if(si){
    const ph=DB.phases.find(p=>p.id===si.phaseId);
    const dis=!ce2?'disabled':'';
    editor=`<div class="editor">
      <div class="ehero">
        <div class="ekicker">${bdg(si.status)}<span style="background:var(--paper-soft);color:var(--muted)" class="badge">${tlabel[si.type]||'Задача'}</span>${ph?`<span class="badge" style="background:#E1F5FE;color:#0277BD">${esc(ph.title)}</span>`:''}</div>
        <div class="etitle">${esc(si.title)}</div>
        ${si.result?`<div style="font-size:11px;color:var(--muted);margin-top:5px">→ ${esc(si.result)}</div>`:''}
      </div>
      <div class="esec">
        <div class="esec-head"><span class="esec-title">Основное</span></div>
        <div class="fgrid">
          <div class="fsm"><span class="lsm">Тип</span><select class="isml" onchange="upItem('type',this.value)" ${dis}>${['task','milestone','risk','decision'].map(t=>`<option value="${t}" ${si.type===t?'selected':''}>${tlabel[t]}</option>`).join('')}</select></div>
          <div class="fsm"><span class="lsm">Статус</span><select class="isml" onchange="upItem('status',this.value)" ${dis}>${Object.entries(slabel).map(([k,v])=>`<option value="${k}" ${si.status===k?'selected':''}>${v}</option>`).join('')}</select></div>
          <div class="fsm full"><span class="lsm">Название</span><input class="isml" value="${esc(si.title)}" onchange="upItem('title',this.value)" ${dis}></div>
          <div class="fsm full"><span class="lsm">Результат</span><textarea class="isml txsm" onchange="upItem('result',this.value)" ${dis}>${esc(si.result||'')}</textarea></div>
          <div class="fsm"><span class="lsm">Начало</span><input type="date" class="isml" value="${si.start||''}" onchange="upItem('start',this.value)" ${dis}></div>
          <div class="fsm"><span class="lsm">Срок</span><input type="date" class="isml" value="${si.due||''}" onchange="upItem('due',this.value)" ${dis}></div>
          <div class="fsm"><span class="lsm">Ответственный</span><select class="isml" onchange="upItem('ownerId',this.value)" ${dis}>${DB.users.map(u=>`<option value="${u.id}" ${si.ownerId===u.id?'selected':''}>${esc(u.name)}</option>`).join('')}</select></div>
          <div class="fsm"><span class="lsm">Фаза</span><select class="isml" onchange="upItem('phaseId',this.value)" ${dis}>${pPhases().map(p=>`<option value="${p.id}" ${si.phaseId===p.id?'selected':''}>${esc(p.title)}</option>`).join('')}</select></div>
        </div>
      </div>
      <div class="esec">
        <div class="esec-head"><span class="esec-title">Подзадачи</span>${ce2?`<button class="btn sm" onclick="addSubtask()">+</button>`:''}</div>
        ${(si.subtasks||[]).map((s,idx)=>`<div class="sub-row"><input type="checkbox" class="chk" ${s.done?'checked':''} onchange="editSub(${idx},'done',this.checked)" ${dis}><input class="mini-inp" value="${esc(s.title)}" onchange="editSub(${idx},'title',this.value)" ${dis}><input type="date" class="mini-date" value="${s.due||''}" onchange="editSub(${idx},'due',this.value)" ${dis}><button class="mini-del" onclick="delSub(${idx})" ${dis}>×</button></div>`).join('')}
        ${ce2?`<div style="display:grid;grid-template-columns:minmax(0,1fr) 96px 60px;gap:5px;margin-top:5px"><input id="ns-t" class="isml" placeholder="Новая подзадача"><input id="ns-d" type="date" class="mini-date" style="height:30px"><button class="btn sm" onclick="addSubtask()">Добавить</button></div>`:''}
      </div>
      <div class="esec">
        <div class="esec-head"><span class="esec-title">SMART</span></div>
        ${['Specific — что именно','Measurable — как измерить','Achievable — реально ли','Relevant — зачем нужно','Time-bound — срок'].map((meta,idx)=>`<div class="smart-row"><div class="sletter">${'SMART'[idx]}</div><div><div class="smeta">${meta}</div><input class="isml" value="${esc((si.smart||[])[idx]||'')}" onchange="editSmart(${idx},this.value)" ${dis}></div></div>`).join('')}
      </div>
      <div class="esec">
        <div class="esec-head"><span class="esec-title">Комментарии</span>${canCom?`<button class="btn sm" onclick="openCommentModal()">+</button>`:''}</div>
        ${canSeeCom?(si.comments||[]).map(c=>{const u=U(c.userId);return`<div class="cmt"><strong>${esc(u.name)}</strong> <small>${esc(c.date)}</small><p>${esc(c.text)}</p></div>`}).join(''):`<div style="font-size:11px;color:var(--soft)">Комментарии скрыты настройками роли</div>`}
        ${canSeeCom&&!(si.comments||[]).length?`<div style="font-size:11px;color:var(--soft)">Нет комментариев</div>`:''}
      </div>
    </div>`;
  }

  $('detailContent').innerHTML=`<div class="cgrid">
    <div class="lpane"><div class="planner"><div class="phase-rail">${rail}</div><div class="task-area">${main}</div></div></div>
    <div class="rpane">${editor}</div>
  </div>`;
}

function editSub(idx,k,v){const i=selItem();if(!canAddSubtaskTo(i))return deny('Нет права изменять подзадачи');if(i?.subtasks?.[idx]!==undefined)i.subtasks[idx][k]=v;saveDB()}
function delSub(idx){const i=selItem();if(!canAddSubtaskTo(i))return deny('Нет права удалять подзадачи');if(!i?.subtasks)return;i.subtasks.splice(idx,1);saveDB();renderDetailMain()}
function addSubtask(){const i=selItem();if(!canAddSubtaskTo(i))return deny('Нет права добавлять подзадачи');const t=$('ns-t')?.value.trim();if(!t)return;i.subtasks=i.subtasks||[];i.subtasks.push({id:uid(),title:t,due:$('ns-d')?.value||'',done:false});saveDB();renderDetailMain();toast('Подзадача добавлена')}
function editSmart(idx,v){const i=selItem();if(!canEditItem(i))return deny('Нет права редактировать SMART');i.smart=i.smart||['','','','',''];i.smart[idx]=v;saveDB()}

function renderKanban2(){
  const sts=[['new','Не начато'],['progress','В работе'],['approval','Согласование'],['risk','Риски'],['done','Готово']];
  const phMap=Object.fromEntries(pPhases().map(p=>[p.id,p.title]));
  $('detailContent').innerHTML=`<div class="kb-wrap"><div class="kb-grid">
    ${sts.map(([s,l])=>{
      const arr=pItems().filter(i=>i.status===s);
      return`<div class="kb-col" ondragover="event.preventDefault()" ondrop="dropKb(event,'${s}')">
        <div class="kb-head"><span class="kb-lbl">${l}</span><span class="kb-cnt">${arr.length}</span></div>
        <div class="kb-body">${arr.map(i=>`<div class="kb-card" draggable="true" ondragstart="event.dataTransfer.setData('text','${i.id}')" onclick="selectItem('${i.id}');setTab('table')">
          <div class="kb-title">${esc(i.title)}</div>
          ${phMap[i.phaseId]?`<span class="kb-phase">${esc(phMap[i.phaseId])}</span><br>`:''}<span class="small muted">${U(i.ownerId).name} · ${fmt(i.due)}</span>
        </div>`).join('')}</div>
      </div>`;
    }).join('')}
  </div></div>`;
}
function dropKb(e,status){e.preventDefault();const id=e.dataTransfer.getData('text');const i=DB.items.find(x=>x.id===id);if(i&&canEditItemField(i,'status')){i.status=status;saveDB();renderKanban2();toast('Статус обновлён')}else deny('Нет права менять статус')}

function renderGantt(){
  const arr=pItems().sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  if(!arr.length){$('detailContent').innerHTML='<div style="padding:24px;text-align:center;color:var(--muted)">Нет задач с датами</div>';return}
  const dates=arr.flatMap(i=>[i.start,i.due]).filter(Boolean).sort();
  const rs=new Date(dates[0]+'T00:00:00');rs.setDate(rs.getDate()-2);
  const re=new Date(dates[dates.length-1]+'T00:00:00');re.setDate(re.getDate()+4);
  const days=[];for(let d=new Date(rs);d<=re;d.setDate(d.getDate()+1))days.push(new Date(d));
  const DAY=30,td=today();
  const dIdx=s=>s?Math.round((new Date(s+'T00:00:00')-rs)/86400000):-1;
  const ds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const dcls=d=>{const dow=d.getDay(),s=ds(d);return dow===0||dow===6?'weekend':s===td?'today':''};
  let mH='';let cm=-1;
  days.forEach((d,i)=>{if(d.getMonth()!==cm){cm=d.getMonth();let c=0;for(let j=i;j<days.length&&days[j].getMonth()===cm;j++)c++;mH+=`<div style="width:${c*DAY}px;flex-shrink:0;display:flex;align-items:center;padding:0 8px;border-right:1px solid var(--line);font-size:11px;font-weight:900;color:var(--ink);white-space:nowrap">${d.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}</div>`}});
  const dH=days.map(d=>{const cl=dcls(d);return`<div style="width:${DAY}px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${cl==='today'?'#1565C0':'var(--muted)'};border-right:1px solid var(--line-soft);background:${cl==='weekend'?'rgba(21,101,192,.04)':cl==='today'?'rgba(21,101,192,.10)':'transparent'}">${d.getDate()}</div>`}).join('');
  const cells=days.map(d=>{const cl=dcls(d);return`<div style="width:${DAY}px;flex-shrink:0;border-right:1px solid var(--line-soft);background:${cl==='weekend'?'rgba(21,101,192,.03)':cl==='today'?'rgba(21,101,192,.09)':'transparent'}"></div>`}).join('');
  let lH='',rH='';
  pPhases().forEach(ph=>{
    const phArr=arr.filter(i=>i.phaseId===ph.id);if(!phArr.length)return;
    lH+=`<div style="height:32px;padding:0 10px;display:flex;align-items:center;background:rgba(21,101,192,.06);border-bottom:1px solid var(--line);font-size:10px;font-weight:900;color:#1565C0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ph.title)}</div>`;
    rH+=`<div style="height:32px;display:flex;border-bottom:1px solid var(--line);background:rgba(21,101,192,.03)">${cells}</div>`;
    phArr.forEach(i=>{
      const col=i.status==='done'?'#00897B':i.type==='milestone'?'#0097A7':i.status==='risk'||i.type==='risk'?'#E53935':'#1565C0';
      const l=Math.max(0,dIdx(i.start||dates[0])),r=dIdx(i.due||i.start||dates[0]),sp=Math.max(1,r-l+1);
      lH+=`<div style="height:34px;padding:0 10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--line-soft);cursor:pointer" onclick="selectItem('${i.id}');setTab('table')"><div style="width:6px;height:6px;border-radius:999px;background:${col};flex-shrink:0"></div><div style="font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(i.title)}</div></div>`;
      rH+=`<div style="height:34px;display:flex;position:relative;border-bottom:1px solid var(--line-soft);cursor:pointer" onclick="selectItem('${i.id}');setTab('table')">${cells}<div style="position:absolute;top:7px;bottom:7px;left:${l*DAY+2}px;width:${sp*DAY-4}px;border-radius:4px;background:${col};min-width:5px;opacity:.85"></div></div>`;
    });
  });
  const ti=dIdx(td);
  const tLine=ti>=0&&ti<days.length?`<div style="position:absolute;top:0;bottom:0;left:${ti*DAY+DAY/2}px;width:2px;background:#1565C0;opacity:.3;pointer-events:none;z-index:2"></div>`:'';
  $('detailContent').innerHTML=`<div style="height:100%;display:grid;grid-template-columns:200px 1fr;overflow:hidden;background:#FAFCFF">
    <div style="display:flex;flex-direction:column;border-right:2px solid var(--line);background:#FAFCFF">
      <div style="height:50px;flex-shrink:0;display:flex;align-items:center;padding:0 10px;font-size:9px;text-transform:uppercase;letter-spacing:.12em;font-weight:900;color:var(--soft);border-bottom:2px solid var(--line)">Задачи</div>
      <div style="overflow-y:auto;flex:1;scrollbar-width:none" id="gL">${lH}</div>
    </div>
    <div style="overflow:auto;display:flex;flex-direction:column" id="gR">
      <div style="flex-shrink:0;position:sticky;top:0;z-index:3;background:rgba(250,252,255,.98);border-bottom:2px solid var(--line)">
        <div style="display:flex;height:22px;border-bottom:1px solid var(--line);width:${days.length*DAY}px">${mH}</div>
        <div style="display:flex;height:28px;width:${days.length*DAY}px">${dH}</div>
      </div>
      <div style="position:relative;width:${days.length*DAY}px">${tLine}${rH}</div>
    </div>
  </div>`;
  const gl=$('gL'),gr=$('gR');
  gr?.addEventListener('scroll',()=>{if(gl)gl.scrollTop=gr.scrollTop});
}

function renderRoadmap(){
  const phs=pPhases();
  $('detailContent').innerHTML=`<div style="height:100%;overflow:auto;padding:12px;background:#FAFCFF"><div style="display:grid;grid-template-columns:repeat(${phs.length||1},minmax(220px,1fr));gap:10px">
    ${phs.map(p=>{const arr=pItems().filter(i=>i.phaseId===p.id);return`<div style="background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:11px;box-shadow:var(--shadow-sm)">

      ${arr.map(i=>`<div style="background:var(--paper-soft);border:1px solid var(--line);border-radius:9px;padding:8px;margin-bottom:6px;cursor:pointer" onclick="selectItem('${i.id}');setTab('table')">
        <div style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:4px">${esc(i.title)}</div>

function renderCalendar(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  let first=new Date(y,m,1).getDay()-1;if(first<0)first=6;
  const dim=new Date(y,m+1,0).getDate();
  let h=`<div style="height:100%;overflow:auto;background:#fff">
    <div style="height:40px;padding:0 14px;display:flex;align-items:center;border-bottom:1px solid var(--line);font-weight:900;color:var(--ink);font-size:13px">${now.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}</div>
    <div style="display:grid;grid-template-columns:repeat(7,minmax(100px,1fr));border-left:1px solid var(--line);border-top:1px solid var(--line);margin:12px">`;
  ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d=>h+=`<div style="height:30px;display:flex;align-items:center;justify-content:center;background:var(--paper-soft);font-size:10px;font-weight:900;color:var(--muted);border-right:1px solid var(--line);border-bottom:1px solid var(--line)">${d}</div>`);
  for(let i=0;i<first;i++)h+=`<div style="border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:80px"></div>`;
  for(let day=1;day<=dim;day++){
    const date=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const arr=pItems().filter(i=>i.start===date||i.due===date);
    const isToday=date===today();
    h+=`<div style="min-height:80px;padding:6px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#fff">
      <div style="font-size:11px;color:${isToday?'#fff':'var(--soft)'};font-weight:900;margin-bottom:4px;${isToday?`width:20px;height:20px;background:var(--blue);border-radius:999px;display:flex;align-items:center;justify-content:center;`:''}">${day}</div>
      ${arr.map(i=>`<div style="font-size:10px;background:var(--blue-soft);color:var(--blue);border-radius:5px;padding:3px 5px;margin-bottom:2px;cursor:pointer;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" onclick="selectItem('${i.id}');setTab('table')">${esc(i.title)}</div>`).join('')}
    </div>`;
  }
  h+='</div></div>';
  $('detailContent').innerHTML=h;
}

function renderAnalytics(){
  const arr=pItems(),tot=arr.length||1;
  const sts=Object.entries(slabel).map(([s,l])=>[l,arr.filter(i=>i.status===s).length,s]);
  const qual=[['С результатом',arr.filter(i=>i.result).length],['Со SMART',arr.filter(i=>(i.smart||[]).filter(Boolean).length>=5).length],['С подзадачами',arr.filter(i=>(i.subtasks||[]).length).length]];
